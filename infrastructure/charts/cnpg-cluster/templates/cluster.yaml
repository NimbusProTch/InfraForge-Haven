apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ .Values.name }}
spec:
  instances: {{ .Values.instances }}
  storage:
    storageClass: {{ .Values.storage.storageClass }}
    size: {{ .Values.storage.size }}
  bootstrap:
    initdb:
      database: {{ .Values.database }}
      owner: {{ .Values.owner }}
  affinity:
    tolerations:
      - operator: "Exists"
