defaultSettings:
  defaultReplicaCount: ${replica_count}
  nodeDownPodDeletionPolicy: delete-both-statefulset-and-deployment-pod
  defaultDataLocality: best-effort
  replicaAutoBalance: best-effort
  replicaZoneSoftAntiAffinity: false
  storageMinimalAvailablePercentage: 15
persistence:
  defaultClassReplicaCount: ${replica_count}
longhornUI:
  replicas: 1
csi:
  attacherReplicaCount: 1
  provisionerReplicaCount: 1
  resizerReplicaCount: 1
  snapshotterReplicaCount: 1
tolerations:
  - operator: "Exists"

# IS3-02: Encrypted StorageClass (LUKS via dm-crypt)
# To enable volume encryption, create the longhorn-crypto Secret first:
#   kubectl create secret generic longhorn-crypto \
#     -n longhorn-system \
#     --from-literal=CRYPTO_KEY_VALUE="$(openssl rand -base64 32)" \
#     --from-literal=CRYPTO_KEY_PROVIDER=secret \
#     --from-literal=CRYPTO_KEY_ID=longhorn-crypto \
#     --from-literal=CRYPTO_PBKDF=argon2i
#
# Then apply the encrypted StorageClass below:
#   kubectl apply -f infrastructure/environments/dev/manifests/longhorn-encrypted-sc.yaml
#
# Migration for existing PVCs: backup → delete PVC → re-create with encrypted SC → restore.
# Note: Encryption is per-StorageClass. Default 'longhorn' SC remains unencrypted.
