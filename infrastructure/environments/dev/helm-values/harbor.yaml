# Harbor Registry
#
# H1e (Harbor TLS): externalURL flipped to https://. The chain is:
#
#   client → https://harbor.<lb-ip>.sslip.io
#       → Cilium Gateway (haven-gateway:443, TLS via per-SAN cert from cert-manager)
#       → HTTPRoute "harbor" (in platform/manifests/harbor/httproute.yaml)
#       → Service harbor:80 (intra-cluster, plaintext OK because ClusterIP-only)
#       → Harbor Registry pods
#
# `expose.tls.enabled: false` is intentional: TLS termination happens
# at the Cilium Gateway, NOT inside Harbor. Harbor receives plaintext
# HTTP from the gateway proxy on the cluster's internal network. The
# Service is `clusterIP` (not LoadBalancer / NodePort), so plaintext
# never leaves the cluster.
#
# `externalURL: https://...` is what matters for clients: it's the URL
# Harbor advertises in image manifests, registry catalog responses, and
# the web UI. Pre-fix this was http:// → docker login + image push/pull
# negotiated cleartext credentials. Post-fix all client traffic is HTTPS
# (Cilium Gateway terminates).
#
# Companion changes in this PR (each is a separate file):
#   - platform/manifests/harbor/httproute.yaml — committed pre-existing
#     route, no behavior change, just GitOps drift control
#   - platform/manifests/haven-builds/harbor-docker-config.yaml —
#     BuildKit docker config WITHOUT insecureRegistries, so BuildKit
#     pushes go via HTTPS (Docker registry POST/PUT do NOT follow 3xx
#     redirects, so HTTPS-only is the only safe direction for in-cluster
#     image push)
#   - platform/manifests/haven-api/configmap.yaml — HARBOR_URL https://
#   - infrastructure/environments/dev/outputs.tf — harbor_url output https://
#
# Operator action required after merge:
#   1. tofu apply  (helm chart re-render → externalURL takes effect on
#      next Harbor pod restart)
#   2. kubectl apply -f platform/manifests/haven-builds/harbor-docker-config.yaml
#   3. kubectl rollout restart deployment/buildkitd -n haven-builds
#   4. Trigger a tenant build via the API and verify HTTPS push works
#      (look for "https://harbor..." in build pod init container logs)
#
# Follow-up sprint (NOT in this PR): once BuildKit is verified pushing
# via HTTPS, add an HTTP→HTTPS 301 redirect HTTPRoute on the gateway
# `:80` listener. Doing it now without the BuildKit migration first
# would FAIL every BuildKit push (Docker protocol 3xx behavior).
expose:
  type: clusterIP
  tls:
    enabled: false
externalURL: https://${harbor_host}
harborAdminPassword: "${admin_password}"
persistence:
  enabled: true
  persistentVolumeClaim:
    registry:
      storageClass: longhorn
      size: ${registry_storage_size}
    database:
      storageClass: longhorn
      size: 5Gi
    redis:
      storageClass: longhorn
      size: 2Gi
    jobservice:
      jobLog:
        storageClass: longhorn
        size: 2Gi
trivy:
  enabled: true
tolerations:
  - operator: "Exists"
