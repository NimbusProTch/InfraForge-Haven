# =============================================================================
# Haven Platform - Wildcard Certificate + DNS-01 ClusterIssuer (IS5-03)
# =============================================================================
# Prerequisites:
#   1. A real domain registered (e.g., haven.example.com)
#   2. Domain delegated to Cloudflare (or update solver below)
#   3. Cloudflare API token with Zone:Read + DNS:Edit permissions
#   4. Create the token secret:
#      kubectl create secret generic cloudflare-api-token \
#        -n cert-manager \
#        --from-literal=api-token="<your-cloudflare-api-token>"
#
# Activation steps (IS5-01 + IS5-02):
#   1. Set in terraform.tfvars:
#        use_real_domain          = true
#        domain                   = "haven.example.com"
#        enable_external_dns      = true
#        cloudflare_api_token     = "<token>"
#        external_dns_domain_filters = ["haven.example.com"]
#   2. Create the Cloudflare token secret (above)
#   3. Apply this manifest:
#        kubectl apply -f infrastructure/environments/dev/manifests/gateway-api-wildcard-cert.yaml
#   4. Run: tofu apply
#   5. Wait for certificate issuance (~2 min via DNS-01)
#
# DNS structure (IS5-02):
#   *.haven.example.com   → platform services (harbor, argocd, keycloak, etc.)
#   *.apps.haven.example.com → tenant apps (auto-provisioned via External-DNS)
# =============================================================================

# --- ClusterIssuer: Let's Encrypt with DNS-01 Cloudflare solver ---
# DNS-01 allows wildcard certificates (HTTP-01 cannot issue wildcards)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-dns01
spec:
  acme:
    email: admin@haven-platform.nl  # TODO: update to actual admin email
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-dns01-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token

---
# --- Wildcard Certificate: *.haven.example.com ---
# Replace DOMAIN_PLACEHOLDER with your actual domain before applying
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: haven-wildcard-tls
  namespace: haven-gateway
spec:
  secretName: haven-wildcard-tls
  issuerRef:
    name: letsencrypt-dns01
    kind: ClusterIssuer
  dnsNames:
    # Platform services wildcard
    - "*.DOMAIN_PLACEHOLDER"
    # Tenant apps wildcard
    - "*.apps.DOMAIN_PLACEHOLDER"
    # Explicit apex (for direct domain access if needed)
    - "DOMAIN_PLACEHOLDER"

---
# --- Gateway: reference wildcard cert (replace current per-SAN cert) ---
# After wildcard cert is issued, update the Gateway to use 'haven-wildcard-tls'
# instead of 'haven-gateway-tls'.
# Run: kubectl patch gateway haven-gateway -n haven-gateway \
#   --type=merge -p '{"spec":{"listeners":[{"name":"https","tls":{"certificateRefs":[{"name":"haven-wildcard-tls"}]}}]}}'
#
# Or apply this manifest directly:

