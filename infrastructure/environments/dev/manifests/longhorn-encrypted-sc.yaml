# =============================================================================
# Haven Platform - Longhorn Encrypted StorageClass (IS3-02)
# =============================================================================
# Prerequisites:
#   1. Create the LUKS encryption key Secret:
#      kubectl create secret generic longhorn-crypto \
#        -n longhorn-system \
#        --from-literal=CRYPTO_KEY_VALUE="$(openssl rand -base64 32)" \
#        --from-literal=CRYPTO_KEY_PROVIDER=secret \
#        --from-literal=CRYPTO_KEY_ID=longhorn-crypto \
#        --from-literal=CRYPTO_PBKDF=argon2i
#
#   2. Apply this StorageClass:
#      kubectl apply -f infrastructure/environments/dev/manifests/longhorn-encrypted-sc.yaml
#
# Usage: reference 'longhorn-encrypted' in PVC.spec.storageClassName for
# sensitive workloads (databases, secrets stores, compliance-required data).
# =============================================================================

apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-encrypted
  annotations:
    # Not the default — explicitly opt in per PVC
    storageclass.kubernetes.io/is-default-class: "false"
provisioner: driver.longhorn.io
allowVolumeExpansion: true
reclaimPolicy: Delete
volumeBindingMode: Immediate
parameters:
  numberOfReplicas: "2"
  staleReplicaTimeout: "2880"
  fromBackup: ""
  encrypted: "true"
  # Reference to the Secret containing the LUKS key
  csi.storage.k8s.io/provisioner-secret-name: longhorn-crypto
  csi.storage.k8s.io/provisioner-secret-namespace: longhorn-system
  csi.storage.k8s.io/node-publish-secret-name: longhorn-crypto
  csi.storage.k8s.io/node-publish-secret-namespace: longhorn-system
  csi.storage.k8s.io/node-stage-secret-name: longhorn-crypto
  csi.storage.k8s.io/node-stage-secret-namespace: longhorn-system
