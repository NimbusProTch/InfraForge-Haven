# ============================================================
# Haven Platform - Cilium Gateway API Resources
# ============================================================
# Applied manually after cluster is active:
#   kubectl apply -f manifests/gateway-api.yaml
#
# Prerequisites:
#   - Gateway API experimental CRDs installed:
#     kubectl apply -f https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.2.1/experimental-install.yaml
#   - Cilium with gatewayAPI.enabled: true (see cilium-values.yaml.tpl)
#   - cert-manager v1.16.2+ installed
# ============================================================

---
# GatewayClass: must be created manually (Cilium operator does not auto-create it)
# Cilium operator picks it up after restart when Gateway API CRDs are present
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: cilium
spec:
  controllerName: io.cilium/gateway-controller

---
# Namespace for Gateway resources
apiVersion: v1
kind: Namespace
metadata:
  name: haven-gateway

---
# ClusterIssuer: Let's Encrypt via HTTP-01 Gateway API solver
# Uses cert-manager's gatewayHTTPRoute solver (cert-manager v1.14+)
# cert-manager creates a temporary HTTPRoute on the HTTP listener for ACME challenges.
# NOTE: Update email before applying.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-gateway
spec:
  acme:
    email: admin@haven-platform.nl  # TODO: update to actual admin email
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-gateway-key
    solvers:
      - http01:
          gatewayHTTPRoute:
            parentRefs:
              - name: haven-gateway
                namespace: haven-gateway
                kind: Gateway
                sectionName: http  # IMPORTANT: bind to HTTP listener only so ACME solver HTTPRoutes are on HTTP

---
# Certificate: single SAN cert covering all gateway hostnames
# cert-manager creates Secret 'haven-gateway-tls' in haven-gateway namespace
# after issuing via ACME HTTP-01 challenge on the HTTP listener.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: haven-gateway-tls
  namespace: haven-gateway
spec:
  secretName: haven-gateway-tls
  issuerRef:
    name: letsencrypt-gateway
    kind: ClusterIssuer
  dnsNames:
    - harbor.46.225.42.2.sslip.io
    - minio.46.225.42.2.sslip.io
    - s3.46.225.42.2.sslip.io
    - argocd.46.225.42.2.sslip.io
    - keycloak.46.225.42.2.sslip.io
    - api.46.225.42.2.sslip.io

---
# Gateway: HTTP (port 80) + HTTPS (port 443) listeners
# Cilium creates Service 'cilium-gateway-haven-gateway' with both ports.
# HTTP listener: serves ACME challenges + redirects everything else to HTTPS.
# HTTPS listener: terminates TLS using the cert-manager-issued secret.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: haven-gateway
  namespace: haven-gateway
spec:
  gatewayClassName: cilium
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - group: ""
            kind: Secret
            name: haven-gateway-tls
      allowedRoutes:
        namespaces:
          from: All

---
# HTTP → HTTPS redirect (catch-all on HTTP listener)
# ACME challenge HTTPRoutes (created by cert-manager) have a more specific
# path prefix (/.well-known/acme-challenge/) and will match before this rule.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-to-https-redirect
  namespace: haven-gateway
spec:
  parentRefs:
    - name: haven-gateway
      namespace: haven-gateway
      sectionName: http
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301

---
# HTTPRoute: Harbor image registry (HTTP + HTTPS)
# NOTE: Cilium 1.16 does not respect sectionName on cross-namespace HTTPRoutes.
# Routes are served on both listeners. ACME solver (Exact path) wins over Harbor
# (PathPrefix /) when cert-manager is configured with sectionName: http.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: harbor
  namespace: harbor-system
spec:
  parentRefs:
    - name: haven-gateway
      namespace: haven-gateway
  hostnames:
    - "harbor.46.225.42.2.sslip.io"
  rules:
    - backendRefs:
        - name: harbor
          port: 80

---
# HTTPRoute: MinIO Console (web UI) (HTTP + HTTPS)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: minio-console
  namespace: minio-system
spec:
  parentRefs:
    - name: haven-gateway
      namespace: haven-gateway
  hostnames:
    - "minio.46.225.42.2.sslip.io"
  rules:
    - backendRefs:
        - name: minio-console
          port: 9001

---
# HTTPRoute: MinIO S3 API (HTTP + HTTPS)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: minio-s3
  namespace: minio-system
spec:
  parentRefs:
    - name: haven-gateway
      namespace: haven-gateway
  hostnames:
    - "s3.46.225.42.2.sslip.io"
  rules:
    - backendRefs:
        - name: minio
          port: 9000

---
# HTTPRoute: ArgoCD (server.insecure=true → HTTP on port 80)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd
  namespace: argocd
spec:
  parentRefs:
    - name: haven-gateway
      namespace: haven-gateway
  hostnames:
    - "argocd.46.225.42.2.sslip.io"
  rules:
    - backendRefs:
        - name: argocd-server
          port: 80

---
# HTTPRoute: Keycloak (Bitnami chart default service: keycloak port 80)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: keycloak
  namespace: keycloak
spec:
  parentRefs:
    - name: haven-gateway
      namespace: haven-gateway
  hostnames:
    - "keycloak.46.225.42.2.sslip.io"
  rules:
    - backendRefs:
        - name: keycloak
          port: 80

---
# HTTPRoute: Haven Platform API (placeholder — haven-api deployed in Phase 1 Sprint 2)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: haven-api
  namespace: haven-system
spec:
  parentRefs:
    - name: haven-gateway
      namespace: haven-gateway
  hostnames:
    - "api.46.225.42.2.sslip.io"
  rules:
    - backendRefs:
        - name: haven-api
          port: 8000

---
# ============================================================
# gateway-proxy DaemonSet
# ============================================================
# Workaround for Cilium 1.16 bug: L7LB Proxy Port is NOT
# propagated to NodePort BPF entries, so external traffic
# can't reach the Cilium gateway via NodePort. This nginx
# DaemonSet runs with hostNetwork:true and proxies to the
# gateway ClusterIP (via stable Service DNS name).
#
# Port 80  → nginx HTTP proxy → gateway Service port 80
#   (proxy_http_version 1.1 required: Cilium Envoy rejects HTTP/1.0)
# Port 443 → nginx stream TCP passthrough → gateway Service port 443
#   (TLS is terminated by Cilium Gateway, not nginx)
# ============================================================

---
apiVersion: v1
kind: Namespace
metadata:
  name: haven-proxy

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-conf
  namespace: haven-proxy
data:
  nginx.conf: |
    user nginx;
    worker_processes auto;
    error_log /dev/stderr warn;
    pid /tmp/nginx.pid;
    events { worker_connections 1024; }
    http {
      access_log /dev/stdout;
      server {
        listen 80;
        location / {
          proxy_pass http://cilium-gateway-haven-gateway.haven-gateway.svc.cluster.local:80;
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header Connection "";
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_connect_timeout 5s;
          proxy_read_timeout 60s;
        }
      }
    }
    stream {
      server {
        listen 443;
        proxy_pass cilium-gateway-haven-gateway.haven-gateway.svc.cluster.local:443;
        proxy_connect_timeout 5s;
        proxy_timeout 60s;
      }
    }

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: gateway-proxy
  namespace: haven-proxy
  labels:
    app: gateway-proxy
spec:
  selector:
    matchLabels:
      app: gateway-proxy
  template:
    metadata:
      labels:
        app: gateway-proxy
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      tolerations:
        - operator: "Exists"
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
              hostPort: 80
              protocol: TCP
            - containerPort: 443
              hostPort: 443
              protocol: TCP
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              memory: "64Mi"
      volumes:
        - name: nginx-conf
          configMap:
            name: nginx-conf
