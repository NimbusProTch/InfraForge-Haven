<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Haven Platform — Architecture Diagram</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d1117;
    color: #e6edf3;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 64px;
  }

  h1 {
    font-size: 22px;
    font-weight: 600;
    color: #f0f6fc;
    letter-spacing: -0.3px;
    margin-bottom: 6px;
  }
  .subtitle {
    font-size: 13px;
    color: #8b949e;
    margin-bottom: 36px;
  }

  .diagram {
    width: 100%;
    max-width: 1200px;
    position: relative;
  }

  svg {
    width: 100%;
    height: auto;
    overflow: visible;
  }

  /* ── Tooltip ── */
  #tooltip {
    position: fixed;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    color: #c9d1d9;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    max-width: 260px;
    z-index: 100;
    line-height: 1.6;
  }
  #tooltip.visible { opacity: 1; }
  #tooltip strong { color: #58a6ff; display: block; margin-bottom: 4px; font-size: 13px; }

  /* ── Legend ── */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    margin-top: 28px;
    justify-content: center;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: #8b949e;
  }
  .legend-dot {
    width: 12px;
    height: 12px;
    border-radius: 3px;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<h1>Haven Platform — Architecture</h1>
<p class="subtitle">Haven-compliant self-service PaaS · 342 Dutch municipalities · EU data sovereignty</p>

<div class="diagram">
<svg viewBox="0 0 1160 820" xmlns="http://www.w3.org/2000/svg">
<defs>
  <!-- Arrow markers -->
  <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#388bfd"/>
  </marker>
  <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#3fb950"/>
  </marker>
  <marker id="arrow-orange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#d29922"/>
  </marker>
  <marker id="arrow-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#bc8cff"/>
  </marker>
  <marker id="arrow-gray" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#484f58"/>

  <filter id="glow">

  <linearGradient id="grad-gitops" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#0d2a0d"/>
    <stop offset="100%" stop-color="#091a09"/>
  </linearGradient>
  <linearGradient id="grad-k8s" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#1a1040"/>
    <stop offset="100%" stop-color="#110b2e"/>
  </linearGradient>
  <linearGradient id="grad-infra" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#1a1208"/>
    <stop offset="100%" stop-color="#120d06"/>
  </linearGradient>
</defs>

<!-- Haven API -->

<!-- Redis Queue -->
<g class="node" data-name="Redis Queue" data-info="Redis FIFO list (haven:git:queue). Serializes all git write operations to prevent commit conflicts. DLQ (haven:git:dlq) for failed ops after 3 retries.">

</g>

<!-- Git Writer Worker -->
<g class="node" data-name="Git Writer Worker" data-info="Single asyncio worker consuming the Redis FIFO queue. Ensures atomic, ordered git commits. Exponential backoff retry, DLQ on failure.">
  <rect x="375" y="135" width="110" height="50" rx="8" fill="#21262d" stroke="#d29922" stroke-width="1.5"/>
  <text x="395" y="155" font-size="18">⚙️</text>

</g>

</div>

<script>
  const tooltip = document.getElementById('tooltip');

  document.querySelectorAll('.node').forEach(node => {
    node.style.cursor = 'pointer';

    node.addEventListener('mouseenter', (e) => {
      const name = node.dataset.name;
      const info = node.dataset.info;
      tooltip.innerHTML = `<strong>${name}</strong>${info}`;
      tooltip.classList.add('visible');
    });

    node.addEventListener('mousemove', (e) => {
      let x = e.clientX + 16;
      let y = e.clientY + 16;
      // Keep within viewport
      if (x + 270 > window.innerWidth) x = e.clientX - 280;
      if (y + 120 > window.innerHeight) y = e.clientY - 120;
      tooltip.style.left = x + 'px';
      tooltip.style.top = y + 'px';
    });

    node.addEventListener('mouseleave', () => {
      tooltip.classList.remove('visible');
    });

    // Subtle hover highlight
    const rect = node.querySelector('rect');
    const origStroke = rect.getAttribute('stroke');
    node.addEventListener('mouseenter', () => {
      rect.style.filter = 'brightness(1.3)';
    });
    node.addEventListener('mouseleave', () => {
      rect.style.filter = '';
    });
  });
</script>
