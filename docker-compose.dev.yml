# Haven Platform - Local Development
# Ports:
#   8080 -> Keycloak
# External services (already running):
#   localhost:5432 -> OrbStack PostgreSQL (haven_platform DB)
#   localhost:6379 -> sesver-redis (reused)
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#   cd api && uvicorn app.main:app --reload --port 8001
#   cd ui  && npm run dev -- --port 3001

services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    container_name: haven-keycloak
    command: start --http-port=8080
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_DB: dev-file
      KC_CACHE: local
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8080:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

volumes:
  keycloak_data:
