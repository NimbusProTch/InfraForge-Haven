# ClusterSecretStore for ESO → Vault integration
# ESO reads secrets from Vault KV v2 and syncs them to K8s Secrets
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: haven-vault
spec:
  provider:
    vault:
      server: "http://vault.vault-system.svc:8200"
      path: "haven"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "haven-eso"
          serviceAccountRef:
            name: "external-secrets"
            namespace: "external-secrets"
