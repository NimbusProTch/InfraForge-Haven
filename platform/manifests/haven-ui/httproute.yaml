apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: haven-ui
  namespace: haven-system
  labels:
    haven.io/component: ui
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: haven-gateway
      namespace: haven-gateway
  hostnames:
    - "app.46.225.42.2.sslip.io"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: haven-ui
          port: 80
          weight: 1
