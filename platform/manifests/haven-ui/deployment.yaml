apiVersion: apps/v1
kind: Deployment
metadata:
  name: haven-ui
  namespace: haven-system
  labels:
    app: haven-ui
    haven.io/component: ui
spec:
  replicas: 2
  selector:
    matchLabels:
      app: haven-ui
  template:
    metadata:
      labels:
        app: haven-ui
        haven.io/component: ui
    spec:
      tolerations:
        - operator: "Exists"
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: haven-ui
                topologyKey: kubernetes.io/hostname
      containers:
        - name: haven-ui
          image: harbor.46.225.42.2.sslip.io/library/haven-ui:e33699c
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: haven-ui-config
            - secretRef:
                name: haven-ui-secrets
          readinessProbe:
            httpGet:
              path: /api/auth/csrf
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/auth/csrf
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          securityContext:
            allowPrivilegeEscalation: false
