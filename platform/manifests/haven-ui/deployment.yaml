apiVersion: apps/v1
kind: Deployment
metadata:
  name: haven-ui
  namespace: haven-system
  labels:
    app: haven-ui
    haven.io/component: ui
spec:
  # Scaled to 0 on iyziops until the haven-ui image is rebuilt against an
  # iyziops-accessible registry. See haven-api/deployment.yaml for context.
  replicas: 0
  selector:
    matchLabels:
      app: haven-ui
  template:
    metadata:
      labels:
        app: haven-ui
        haven.io/component: ui
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      tolerations:
        - operator: "Exists"
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: haven-ui
                topologyKey: kubernetes.io/hostname
      containers:
        - name: haven-ui
          image: harbor.46.225.42.2.sslip.io/library/haven-ui@sha256:1c48d9dd56a319a0f931047493e308fe25d135dd2de1f9d187e35f72581bfc77
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: haven-ui-config
            - secretRef:
                name: haven-ui-secrets
                optional: true
          readinessProbe:
            httpGet:
              path: /api/auth/csrf
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/auth/csrf
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
