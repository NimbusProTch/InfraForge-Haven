apiVersion: apps/v1
kind: Deployment
metadata:
  name: haven-api
  namespace: haven-system
  labels:
    app: haven-api
    haven.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: haven-api
  template:
    metadata:
      labels:
        app: haven-api
        haven.io/component: api
      annotations:
        # Force pod restart when ConfigMap changes (ArgoCD will update this annotation)
        kubectl.kubernetes.io/restartedAt: "2026-04-06T06:45:00Z"
    spec:
      serviceAccountName: haven-api
      tolerations:
        - operator: "Exists"
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: haven-api
                topologyKey: kubernetes.io/hostname
      initContainers:
        - name: db-migrate
          image: harbor.46.225.42.2.sslip.io/library/haven-api:d057179
          command:
            - sh
            - -c
            - |
              # Run pending migrations (idempotent — skips already-applied ones)
              # NEVER use 'stamp head' here — it marks DB as migrated without running migrations
              python -m alembic -c alembic/alembic.ini upgrade head
          envFrom:
            - configMapRef:
                name: haven-api-config
            - secretRef:
                name: haven-api-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
      containers:
        - name: haven-api
          image: harbor.46.225.42.2.sslip.io/library/haven-api:d057179
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: K8S_INCLUSTER
              value: "true"
          envFrom:
            - configMapRef:
                name: haven-api-config
            - secretRef:
                name: haven-api-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
