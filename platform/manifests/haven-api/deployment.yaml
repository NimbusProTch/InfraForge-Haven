apiVersion: apps/v1
kind: Deployment
metadata:
  name: haven-api
  namespace: haven-system
  labels:
    app: haven-api
    haven.io/component: api
spec:
  # Scaled to 0 on iyziops until the image is rebuilt against an iyziops-
  # accessible registry. The original image reference points at the old
  # Haven Hetzner cluster Harbor (harbor.46.225.42.2.sslip.io) which does
  # not exist here. To re-enable: push the haven-api image to a registry
  # the iyziops cluster can pull (ghcr.io / docker.io / iyziops-internal
  # Harbor when deployed), update the .image field below + db-migrate
  # initContainer image, restore replicas to 2, populate haven-api-secrets
  # (Keycloak realm, CNPG DSN, etc).
  replicas: 0
  selector:
    matchLabels:
      app: haven-api
  template:
    metadata:
      labels:
        app: haven-api
        haven.io/component: api
      annotations:
        # Force pod restart when ConfigMap changes (ArgoCD will update this annotation)
        kubectl.kubernetes.io/restartedAt: "2026-04-13T09:00:00Z"
    spec:
      serviceAccountName: haven-api
      # Pod-level security context — applies to every container by default.
      # PSA restricted requires runAsNonRoot + seccompProfile at this level.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      tolerations:
        - operator: "Exists"
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: haven-api
                topologyKey: kubernetes.io/hostname
      initContainers:
        - name: db-migrate
          image: harbor.46.225.42.2.sslip.io/library/haven-api@sha256:ee72fb4702af177f1e374d2fe512f05682979358fdd25b7c281001091a0309f7
          command:
            - sh
            - -c
            - |
              # Run pending migrations (idempotent — skips already-applied ones)
              # NEVER use 'stamp head' here — it marks DB as migrated without running migrations
              python -m alembic -c alembic/alembic.ini upgrade head
          envFrom:
            - configMapRef:
                name: haven-api-config
            - secretRef:
                name: haven-api-secrets
                optional: true
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          # PSA restricted requires every container (including initContainers)
          # to set these explicitly. Inheriting from pod-level securityContext
          # is not enough for the admission check.
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
      containers:
        - name: haven-api
          image: harbor.46.225.42.2.sslip.io/library/haven-api@sha256:ee72fb4702af177f1e374d2fe512f05682979358fdd25b7c281001091a0309f7
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: K8S_INCLUSTER
              value: "true"
          envFrom:
            - configMapRef:
                name: haven-api-config
            - secretRef:
                name: haven-api-secrets
                optional: true
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
