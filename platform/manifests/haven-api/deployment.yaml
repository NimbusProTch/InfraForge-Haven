apiVersion: apps/v1
kind: Deployment
metadata:
  name: haven-api
  namespace: haven-system
  labels:
    app: haven-api
    haven.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: haven-api
  template:
    metadata:
      labels:
        app: haven-api
        haven.io/component: api
      annotations:
        # Force pod restart when ConfigMap changes (ArgoCD will update this annotation)
        kubectl.kubernetes.io/restartedAt: "2026-03-29T05:45:00Z"
    spec:
      serviceAccountName: haven-api
      tolerations:
        - operator: "Exists"
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: haven-api
                topologyKey: kubernetes.io/hostname
      containers:
        - name: haven-api
          image: harbor.46.225.42.2.sslip.io/library/haven-api:eb83f8d-amd64
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: K8S_INCLUSTER
              value: "true"
          envFrom:
            - configMapRef:
                name: haven-api-config
            - secretRef:
                name: haven-api-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
