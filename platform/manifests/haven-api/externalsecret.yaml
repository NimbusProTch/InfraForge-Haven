# H1e (Vault → ESO migration): pull haven-api-secrets from Vault.
#
# Pre-fix: `haven-api-secrets` was a native K8s Secret created out-of-band
# (no manifest in repo, no rotation policy, no audit trail). Anyone with
# `kubectl get secret -n haven-system` could read all 9 sensitive keys.
# This is the production-grade SaaS gap closure for secret management.
#
# Strategy: External Secrets Operator (ESO) syncs from Vault.
#
#   Vault KV path: haven/haven-api
#       ↓ (every refreshInterval)
#   ExternalSecret "haven-api-secrets-sync" (this file)
#       ↓ (creates / updates)
#   K8s Secret "haven-api-secrets" (consumed by Deployment.envFrom)
#
# The ClusterSecretStore `haven-vault` (already deployed in
# `external-secrets` namespace, status Valid) authenticates to Vault via
# Kubernetes ServiceAccount tokens. ESO uses that to mint a Vault token
# scoped to the haven KV path.
#
# Operator-side prerequisite (Vault data write — runbook in
# `docs/H1E_VAULT_MIGRATION_RUNBOOK.md`):
#
#   1. Read the existing native secret values out of the cluster
#   2. Write each as a Vault KV pair under `haven/haven-api`
#   3. Verify with `vault kv get haven/haven-api`
#   4. Apply this ExternalSecret manifest
#   5. Wait for ESO to populate `haven-api-secrets` (or fail with conflict)
#   6. **Cutover**: delete the existing native `haven-api-secrets`,
#      re-apply this manifest, ESO recreates the secret from Vault
#   7. Restart haven-api: `kubectl rollout restart deployment/haven-api`
#   8. Verify pods come up healthy with the new (Vault-sourced) secret
#
# Rollback: delete the ExternalSecret, re-create the native secret with
# the values from the Vault KV (use `vault kv get -format=json` + jq).

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: haven-api-secrets-sync
  namespace: haven-system
  labels:
    haven.io/managed: "true"
    haven.io/component: api
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: haven-vault
    kind: ClusterSecretStore
  target:
    name: haven-api-secrets
    creationPolicy: Owner   # ESO owns the resulting K8s Secret
    deletionPolicy: Retain  # If this ExternalSecret is deleted, keep the Secret
                            # (rollback safety: native Secret stays alive)
    template:
      type: Opaque
      metadata:
        labels:
          haven.io/managed-by: external-secrets
          haven.io/source: vault
      data:
        # 1:1 passthrough from Vault KV keys to Secret data keys.
        # The Vault KV pairs at haven/haven-api are expected to be:
        #   ARGOCD_AUTH_TOKEN, DATABASE_URL, EVEREST_ADMIN_PASSWORD,
        #   GITEA_ADMIN_TOKEN, GITHUB_CLIENT_ID, GITHUB_CLIENT_SECRET,
        #   HARBOR_ADMIN_PASSWORD, SECRET_KEY, VAULT_TOKEN
        ARGOCD_AUTH_TOKEN: "{{ .ARGOCD_AUTH_TOKEN }}"
        DATABASE_URL: "{{ .DATABASE_URL }}"
        EVEREST_ADMIN_PASSWORD: "{{ .EVEREST_ADMIN_PASSWORD }}"
        GITEA_ADMIN_TOKEN: "{{ .GITEA_ADMIN_TOKEN }}"
        GITHUB_CLIENT_ID: "{{ .GITHUB_CLIENT_ID }}"
        GITHUB_CLIENT_SECRET: "{{ .GITHUB_CLIENT_SECRET }}"
        HARBOR_ADMIN_PASSWORD: "{{ .HARBOR_ADMIN_PASSWORD }}"
        SECRET_KEY: "{{ .SECRET_KEY }}"
        VAULT_TOKEN: "{{ .VAULT_TOKEN }}"
  data:
    # Map each Vault KV key → template variable. The dataFrom alternative
    # would do a wholesale pull, but we list each key explicitly so a
    # missing key fails loudly at sync time instead of silently producing
    # an empty Secret value.
    - secretKey: ARGOCD_AUTH_TOKEN
      remoteRef:
        key: haven-api
        property: ARGOCD_AUTH_TOKEN
    - secretKey: DATABASE_URL
      remoteRef:
        key: haven-api
        property: DATABASE_URL
    - secretKey: EVEREST_ADMIN_PASSWORD
      remoteRef:
        key: haven-api
        property: EVEREST_ADMIN_PASSWORD
    - secretKey: GITEA_ADMIN_TOKEN
      remoteRef:
        key: haven-api
        property: GITEA_ADMIN_TOKEN
    - secretKey: GITHUB_CLIENT_ID
      remoteRef:
        key: haven-api
        property: GITHUB_CLIENT_ID
    - secretKey: GITHUB_CLIENT_SECRET
      remoteRef:
        key: haven-api
        property: GITHUB_CLIENT_SECRET
    - secretKey: HARBOR_ADMIN_PASSWORD
      remoteRef:
        key: haven-api
        property: HARBOR_ADMIN_PASSWORD
    - secretKey: SECRET_KEY
      remoteRef:
        key: haven-api
        property: SECRET_KEY
    - secretKey: VAULT_TOKEN
      remoteRef:
        key: haven-api
        property: VAULT_TOKEN
