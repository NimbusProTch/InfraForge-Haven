apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: haven-api
  namespace: haven-system
  labels:
    haven.io/component: api
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: iyziops-gateway
      namespace: iyziops-gateway
      sectionName: https
  hostnames:
    - "api.iyziops.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: haven-api
          port: 80
          weight: 1
