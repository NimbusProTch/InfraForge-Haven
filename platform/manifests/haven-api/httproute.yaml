apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: haven-api
  namespace: haven-system
  labels:
    haven.io/component: api
spec:
  parentRefs:
    - name: haven-gateway
      namespace: haven-gateway
  hostnames:
    - "api.46.225.42.2.sslip.io"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: haven-api
          port: 80
