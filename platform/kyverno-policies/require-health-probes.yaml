apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-health-probes
  annotations:
    policies.kyverno.io/title: Require Health Probes
    policies.kyverno.io/category: Reliability
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      Deployments and StatefulSets in tenant namespaces must define liveness
      and readiness probes for graceful rolling updates and automatic restart
      on failure. Jobs and CronJobs are exempt.
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: require-liveness-probe
      match:
        any:
          - resources:
              kinds:
                - Deployment
                - StatefulSet
              namespaceSelector:
                matchLabels:
                  haven.io/managed: "true"
      validate:
        message: "Liveness probe is required on all containers in Deployments and StatefulSets."
        pattern:
          spec:
            template:
              spec:
                containers:
                  - livenessProbe:
                      periodSeconds: "?*"
    - name: require-readiness-probe
      match:
        any:
          - resources:
              kinds:
                - Deployment
              namespaceSelector:
                matchLabels:
                  haven.io/managed: "true"
      validate:
        message: "Readiness probe is required on Deployment containers for graceful rollouts."
        pattern:
          spec:
            template:
              spec:
                containers:
                  - readinessProbe:
                      periodSeconds: "?*"
