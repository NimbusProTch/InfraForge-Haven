---
# =============================================================================
#  iyziops — platform-ingress App
# =============================================================================
#  Watches platform/argocd/apps/ingress/. Future residents: Gateway API
#  standard channel CRDs, experimental tlsroute CRD, the iyziops-gateway
#  Gateway resource, and HTTPRoute manifests for every platform subdomain
#  (argocd.*, api.*, ui.*, harbor.*, keycloak.*, grafana.*, etc.).
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-ingress
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: iyziops-platform
  source:
    repoURL: https://github.com/NimbusProTch/InfraForge-Haven.git
    targetRevision: refactor/iyziops-option-b-2lb-ccm
    path: platform/argocd/apps/ingress
    directory:
      recurse: true
      include: '*.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ApplyOutOfSyncOnly=true
