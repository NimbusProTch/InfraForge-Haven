---
# =============================================================================
#  iyziops — platform-raw ApplicationSet
# =============================================================================
#  Manages ALL platform components that come from raw Kubernetes YAML in the
#  git repo (not Helm charts). Split from platform-helm so the template is
#  single-source-type (git path only), which keeps kubectl dry-run validation
#  working without goTemplate source-type conditionals.
#
#  Sync-wave layout (positive only — K8s label values cannot start with '-'):
#     0  ingress              (Gateway + HTTPRoute + ReferenceGrant)
#                             — depends on gateway-api CRDs (cloud-init installed).
#                             — runs parallel with platform-helm wave 0 operators
#                                because ingress resources have no hard dep on
#                                cert-manager/longhorn/kyverno controllers.
#     1  cert-manager-config  (ClusterIssuers + wildcard cert)
#                             — depends on cert-manager webhook Ready (wave 0 in platform-helm)
#     1  kyverno-policies     (5 ClusterPolicy, Audit mode)
#                             — depends on kyverno admission controller Ready (wave 0)
#
#  Cross-appset ordering: wave 1 elements here need wave 0 operators from
#  platform-helm to be Healthy. ArgoCD does not strictly coordinate this
#  across appsets, but retry + selfHeal (10 attempts, exponential backoff up
#  to 2m) guarantees eventual convergence within ~5 minutes of cold boot.
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-raw
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]

  strategy:
    type: RollingSync
    rollingSync:
      steps:
        - matchExpressions:
            - key: argocd.argoproj.io/sync-wave
              operator: In
              values: ["0"]
          maxUpdate: 100%
        - matchExpressions:
            - key: argocd.argoproj.io/sync-wave
              operator: In
              values: ["1"]
          maxUpdate: 100%

  generators:
    - list:
        elements:
          # ----- Wave 0: Namespaces (must exist before workloads land) ----
          # Namespaces with PSA labels that downstream Helm charts need.
          # Created with CreateNamespace=false because the PSA metadata
          # matters — ArgoCD should manage the full Namespace resource.
          - name: platform-namespaces
            namespace: default
            syncWave: "0"
            path: platform/argocd/apps/platform/namespaces

          # ----- Wave 0: Ingress (Gateway + HTTPRoute) --------------------
          # Parallel with platform-helm wave 0 operators. Ingress resources
          # have no hard dep on cert-manager / longhorn / kyverno controllers.
          - name: platform-ingress
            namespace: argocd
            syncWave: "0"
            path: platform/argocd/apps/platform/ingress

          # ----- Wave 1: Config (ClusterIssuers + ClusterPolicies) --------
          - name: cert-manager-config
            namespace: cert-manager
            syncWave: "1"
            path: platform/argocd/apps/platform/cert-manager-config

          - name: kyverno-policies
            namespace: kyverno-system
            syncWave: "1"
            path: platform/argocd/apps/platform/kyverno-policies

  template:
    metadata:
      name: "{{.name}}"
      namespace: argocd
      labels:
        argocd.argoproj.io/sync-wave: "{{.syncWave}}"
        iyziops.io/layer: platform-raw
      annotations:
        argocd.argoproj.io/sync-wave: "{{.syncWave}}"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: iyziops-platform
      source:
        repoURL: https://github.com/NimbusProTch/InfraForge-Haven.git
        targetRevision: main
        path: "{{.path}}"
        directory:
          recurse: true
          include: "*.yaml"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{.namespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=false
          - ServerSideApply=true
        retry:
          limit: 10
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 2m

      # Kyverno admission controller mutates ClusterPolicy resources at
      # admission time (adds admission:true, background:true, emitWarning,
      # skipBackgroundRequests, allowExistingViolations defaults) and writes
      # status.autogen.rules[] for auto-generated DaemonSet/CronJob rules.
      # These fields are not in our git manifests, so ArgoCD reports OutOfSync
      # on kyverno-policies forever. Ignoring them keeps the Application
      # Synced while still detecting real drift on our declared fields.
      # Only applies to ClusterPolicy kind; other elements in this appset
      # (cert-manager-config, platform-ingress) are unaffected.
      ignoreDifferences:
        - group: kyverno.io
          kind: ClusterPolicy
          jqPathExpressions:
            - .spec.admission
            - .spec.background
            - .spec.emitWarning
            - .spec.rules[]?.skipBackgroundRequests
            - .spec.rules[]?.validate.allowExistingViolations
