---
# =============================================================================
#  iyziops — platform-helm ApplicationSet
# =============================================================================
#  Manages ALL Helm-chart-based platform components. Split from platform-raw
#  so the ApplicationSet template is single-source-type (Helm only), which
#  keeps kubectl dry-run validation working and avoids ArgoCD's experimental
#  templatePatch feature.
#
#  Sync-wave layout:
#    0   cert-manager, longhorn, kyverno            (operators, controllers)
#    3   kube-prometheus-stack, loki, alloy         (observability, future)
#    4   everest, redis-operator, rabbitmq-operator (data services, future)
#
#  RollingSync strategy gates each wave on the previous wave's Healthy state.
#  Cross-appset ordering (platform-raw wave 1 config → needs operator wave 0
#  Healthy) is handled by retry + selfHeal on each generated Application.
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: platform-helm
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]

  strategy:
    type: RollingSync
    rollingSync:
      steps:
        - matchExpressions:
            - key: argocd.argoproj.io/sync-wave
              operator: In
              values: ["0"]
          maxUpdate: 100%
        - matchExpressions:
            - key: argocd.argoproj.io/sync-wave
              operator: In
              values: ["3"]
          maxUpdate: 100%
        - matchExpressions:
            - key: argocd.argoproj.io/sync-wave
              operator: In
              values: ["4"]
          maxUpdate: 100%
        - matchExpressions:
            - key: argocd.argoproj.io/sync-wave
              operator: In
              values: ["5"]
          maxUpdate: 100%

  generators:
    - list:
        elements:
          # ----- Wave 0: Operators (controllers + CRDs) -------------------
          - name: cert-manager
            namespace: cert-manager
            syncWave: "0"
            repoURL: https://charts.jetstack.io
            chart: cert-manager
            targetRevision: v1.20.2
            values: |
              crds:
                enabled: true
                keep: true
              prometheus:
                enabled: false
              replicaCount: 2
              webhook:
                replicaCount: 2
              cainjector:
                replicaCount: 2

          - name: longhorn
            namespace: longhorn-system
            syncWave: "0"
            repoURL: https://charts.longhorn.io
            chart: longhorn
            targetRevision: "1.8.0"
            values: |
              preUpgradeChecker:
                jobEnabled: false
              defaultSettings:
                defaultReplicaCount: 3
                defaultDataPath: /var/lib/longhorn/
                storageOverProvisioningPercentage: 100
                storageMinimalAvailablePercentage: 15
                # false = create default disk on every Longhorn node.
                # Previously true, which required nodes to carry the label
                # node.longhorn.io/create-default-disk=true. Our nodes
                # didn't have that label so NO disks got provisioned,
                # leaving volumes faulted with zero replicas schedulable.
                createDefaultDiskLabeledNodes: false
                # Allow Longhorn engine-image + instance-manager DaemonSets
                # to run on master nodes. RKE2 applies CriticalAddonsOnly
                # NoExecute taint (not the vanilla control-plane taint).
                # Without this, engine-image DS only lands on workers (3
                # pods), starving volume replicas and causing faulted
                # volumes when workloads request storage.
                taintToleration: "CriticalAddonsOnly=true:NoExecute"
              persistence:
                defaultClass: true
                defaultClassReplicaCount: 3
                defaultDataLocality: best-effort
                reclaimPolicy: Delete
              longhornManager:
                tolerations:
                  - operator: Exists
              longhornDriver:
                tolerations:
                  - operator: Exists

          - name: kyverno
            namespace: kyverno-system
            syncWave: "0"
            repoURL: https://kyverno.github.io/kyverno/
            chart: kyverno
            targetRevision: "3.7.1"
            values: |
              admissionController:
                replicas: 3
                podDisruptionBudget:
                  minAvailable: 2
                resources:
                  requests:
                    cpu: 200m
                    memory: 512Mi
                  limits:
                    memory: 2Gi
              backgroundController:
                replicas: 2
                resources:
                  requests:
                    cpu: 100m
                    memory: 256Mi
                  limits:
                    memory: 1Gi
              cleanupController:
                replicas: 1
              reportsController:
                replicas: 1
              config:
                excludeKyvernoNamespace: true
                webhooks:
                  failurePolicy: Fail
                  namespaceSelector:
                    matchExpressions:
                      - key: kubernetes.io/metadata.name
                        operator: NotIn
                        values:
                          - kyverno-system
                          - kube-system
                          - kube-public
                          - kube-node-lease
                          - default
                          - argocd
                          - haven-system
                          - haven-builds
                          - iyziops-gateway
                          - longhorn-system
                          - cert-manager
                          - monitoring
                          - logging
                          - harbor-system
                          - minio-system
                          - gitea-system
                          - keycloak
                          - cnpg-system
                          - everest
                          - everest-system
                          - everest-olm
                          - everest-monitoring
                          - redis-system
                          - rabbitmq-system
              features:
                policyExceptions:
                  enabled: true
                  namespace: kyverno-system

          # ----- Wave 3: Observability — metrics (kube-prometheus-stack) --
          # Prometheus Operator + kube-state-metrics + node-exporter + Grafana
          # + Alertmanager. Node-exporter DaemonSet needs hostPath/hostNetwork
          # → monitoring namespace is PSA `baseline` (see platform-raw apps/
          # platform/namespaces/monitoring.yaml). Grafana datasources include
          # Prometheus (self) + Loki (logging.svc.cluster.local) for unified
          # metrics+logs in one pane. Grafana admin password: chart-generated
          # random secret (`kube-prometheus-stack-grafana`), retrieve via
          # `kubectl get secret -n monitoring kube-prometheus-stack-grafana`.
          - name: kube-prometheus-stack
            namespace: monitoring
            syncWave: "3"
            repoURL: https://prometheus-community.github.io/helm-charts
            chart: kube-prometheus-stack
            targetRevision: "66.3.1"
            values: |
              crds:
                enabled: true
              defaultRules:
                create: true
              global:
                rbac:
                  create: true
                  pspEnabled: false
              alertmanager:
                enabled: true
                alertmanagerSpec:
                  replicas: 1
                  storage:
                    volumeClaimTemplate:
                      spec:
                        storageClassName: longhorn
                        accessModes: ["ReadWriteOnce"]
                        resources:
                          requests:
                            storage: 10Gi
                  resources:
                    requests:
                      cpu: 50m
                      memory: 128Mi
                    limits:
                      memory: 512Mi
              prometheus:
                enabled: true
                prometheusSpec:
                  replicas: 1
                  retention: 15d
                  retentionSize: "40GB"
                  resources:
                    requests:
                      cpu: 200m
                      memory: 1Gi
                    limits:
                      memory: 4Gi
                  storageSpec:
                    volumeClaimTemplate:
                      spec:
                        storageClassName: longhorn
                        accessModes: ["ReadWriteOnce"]
                        resources:
                          requests:
                            storage: 50Gi
                  serviceMonitorSelectorNilUsesHelmValues: false
                  podMonitorSelectorNilUsesHelmValues: false
                  ruleSelectorNilUsesHelmValues: false
                  probeSelectorNilUsesHelmValues: false
                  scrapeConfigSelectorNilUsesHelmValues: false
              grafana:
                enabled: true
                replicas: 1
                defaultDashboardsEnabled: true
                persistence:
                  enabled: true
                  type: pvc
                  storageClassName: longhorn
                  size: 10Gi
                  accessModes: ["ReadWriteOnce"]
                resources:
                  requests:
                    cpu: 100m
                    memory: 256Mi
                  limits:
                    memory: 1Gi
                # Let chart generate random admin password into the
                # kube-prometheus-stack-grafana secret. Phase 3 (Vault + ESO)
                # will migrate this to an ExternalSecret.
                admin:
                  existingSecret: ""
                service:
                  type: ClusterIP
                  port: 80
                grafana.ini:
                  server:
                    root_url: https://grafana.iyziops.com
                    serve_from_sub_path: false
                  auth.anonymous:
                    enabled: false
                  analytics:
                    reporting_enabled: false
                    check_for_updates: false
                additionalDataSources:
                  - name: Loki
                    type: loki
                    uid: loki
                    url: http://loki.logging.svc.cluster.local:3100
                    access: proxy
                    isDefault: false
                    jsonData:
                      maxLines: 1000
              kubeStateMetrics:
                enabled: true
              kube-state-metrics:
                resources:
                  requests:
                    cpu: 50m
                    memory: 128Mi
                  limits:
                    memory: 256Mi
              nodeExporter:
                enabled: true
              prometheus-node-exporter:
                resources:
                  requests:
                    cpu: 50m
                    memory: 64Mi
                  limits:
                    memory: 128Mi
                hostRootFsMount:
                  enabled: true
                  mountPropagation: HostToContainer
                # RKE2 masters carry CriticalAddonsOnly=true:NoExecute
                # (not control-plane:NoSchedule). Default chart toleration
                # only covers NoSchedule → DS Desired=3 (workers only).
                # Tolerate everything so node-exporter runs on all 6 nodes.
                tolerations:
                  - operator: Exists
              prometheusOperator:
                enabled: true
                resources:
                  requests:
                    cpu: 50m
                    memory: 128Mi
                  limits:
                    memory: 512Mi
              # Disable kube-apiserver/kubelet/etc ServiceMonitors that scrape
              # control-plane components we don't expose metrics on (RKE2 pins
              # these behind auth). Prometheus would error-out otherwise.
              kubeApiServer:
                enabled: true
              kubelet:
                enabled: true
              kubeControllerManager:
                enabled: false
              kubeScheduler:
                enabled: false
              kubeProxy:
                enabled: false
              kubeEtcd:
                enabled: false

          # ----- Wave 3: Observability (log aggregation) ----------------
          # Loki Monolithic mode (SingleBinary) with Longhorn persistent
          # storage. 14-day retention. auth_enabled=false for in-cluster
          # consumers (ArgoCD, Alloy, Grafana). Gateway disabled — internal
          # traffic only.
          - name: loki
            namespace: logging
            syncWave: "3"
            repoURL: https://grafana.github.io/helm-charts
            chart: loki
            targetRevision: "6.55.0"
            values: |
              deploymentMode: SingleBinary
              loki:
                auth_enabled: false
                commonConfig:
                  replication_factor: 1
                schemaConfig:
                  configs:
                    - from: "2024-04-01"
                      store: tsdb
                      object_store: filesystem
                      schema: v13
                      index:
                        prefix: loki_index_
                        period: 24h
                storage:
                  type: filesystem
                limits_config:
                  retention_period: 336h
                  reject_old_samples: true
                  reject_old_samples_max_age: 168h
                compactor:
                  working_directory: /var/loki/compactor
                  retention_enabled: true
                  delete_request_store: filesystem
                pattern_ingester:
                  enabled: false
                ruler:
                  enable_api: true
              singleBinary:
                replicas: 1
                persistence:
                  enabled: true
                  storageClass: longhorn
                  size: 50Gi
                resources:
                  requests:
                    cpu: 100m
                    memory: 256Mi
                  limits:
                    cpu: 1
                    memory: 1Gi
              # Chart validation: when deploymentMode=SingleBinary, all of
              # these SSD-mode replicas must be zero, otherwise the chart
              # refuses to render ("more than zero replicas configured for
              # both single binary and simple scalable targets").
              read:
                replicas: 0
              write:
                replicas: 0
              backend:
                replicas: 0
              chunksCache:
                enabled: false
              resultsCache:
                enabled: false
              gateway:
                enabled: false
              monitoring:
                selfMonitoring:
                  enabled: false
                  grafanaAgent:
                    installOperator: false
                lokiCanary:
                  enabled: false
              test:
                enabled: false
              minio:
                enabled: false

          # Alloy DaemonSet collects pod logs from /var/log/pods and ships
          # them to Loki. Replaces Promtail (deprecated Mar 2026). Needs
          # PSA baseline (hostPath access) — namespace label set by
          # platform-raw apps/platform/namespaces/logging.yaml.
          - name: alloy
            namespace: logging
            syncWave: "3"
            repoURL: https://grafana.github.io/helm-charts
            chart: alloy
            targetRevision: "1.7.0"
            values: |
              alloy:
                configMap:
                  content: |
                    // Discover pods
                    discovery.kubernetes "pod" {
                      role = "pod"
                    }

                    // Relabel kubernetes metadata onto log streams
                    discovery.relabel "pod_logs" {
                      targets = discovery.kubernetes.pod.targets
                      rule {
                        source_labels = ["__meta_kubernetes_namespace"]
                        target_label  = "namespace"
                      }
                      rule {
                        source_labels = ["__meta_kubernetes_pod_name"]
                        target_label  = "pod"
                      }
                      rule {
                        source_labels = ["__meta_kubernetes_pod_container_name"]
                        target_label  = "container"
                      }
                      rule {
                        source_labels = ["__meta_kubernetes_pod_node_name"]
                        target_label  = "node"
                      }
                      rule {
                        source_labels = ["__meta_kubernetes_pod_label_app"]
                        target_label  = "app"
                      }
                    }

                    // Read container logs via kubelet /var/log/pods
                    loki.source.kubernetes "pods" {
                      targets    = discovery.relabel.pod_logs.output
                      forward_to = [loki.write.default.receiver]
                    }

                    // Ship to Loki (cluster-internal service)
                    loki.write "default" {
                      endpoint {
                        url = "http://loki.logging.svc.cluster.local:3100/loki/api/v1/push"
                      }
                    }
                resources:
                  requests:
                    cpu: 50m
                    memory: 128Mi
                  limits:
                    cpu: 500m
                    memory: 512Mi
              controller:
                type: daemonset
                tolerations:
                  - operator: Exists
              crds:
                create: false

          # ----- Wave 4: Platform storage (MinIO) -----------------------
          # Official MinIO community chart from charts.min.io. Standalone
          # mode on Longhorn. Used by:
          #   - Harbor registry blob storage (Phase 4)
          #   - CNPG / Everest backup targets (Phase 5+)
          #   - tenant object storage API (later sprint)
          # Switched from Bitnami chart because Bitnami moved newer releases
          # to OCI-only (14.8.5 images broken after late-2025 legacy cutoff).
          # Official chart pulls quay.io/minio/minio (always free).
          # Root credentials from existingSecret (minio-root, created at
          # bootstrap via cloud-init for reproducibility); Phase 3 will
          # migrate to ExternalSecret from Vault.
          - name: minio
            namespace: minio-system
            syncWave: "4"
            repoURL: https://charts.min.io
            chart: minio
            targetRevision: "5.4.0"
            values: |
              mode: standalone
              # Credentials come from the `minio-credentials` Secret in the
              # minio-system namespace, bootstrapped out-of-band via kubectl
              # after cluster creation. Phase 3 will migrate this secret to
              # an ExternalSecret sourced from Vault.
              existingSecret: minio-credentials
              replicas: 1
              drivesPerNode: 1
              persistence:
                enabled: true
                storageClass: longhorn
                size: 50Gi
                accessMode: ReadWriteOnce
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  memory: 1Gi
              service:
                type: ClusterIP
                port: 9000
              consoleService:
                type: ClusterIP
                port: 9001
              buckets:
                - name: iyziops-backups
                  policy: none
                  purge: false
                - name: iyziops-registry
                  policy: none
                  purge: false
              metrics:
                serviceMonitor:
                  enabled: true
                  additionalLabels:
                    release: kube-prometheus-stack
              securityContext:
                enabled: true
                runAsUser: 1000
                runAsGroup: 1000
                fsGroup: 1000
                runAsNonRoot: true
              makeUserJob:
                securityContext:
                  enabled: false
              makeBucketJob:
                securityContext:
                  enabled: false
              postJob:
                securityContext:
                  enabled: false

          # ----- Wave 4: Secrets management (Vault + ESO) ----------------
          # HashiCorp Vault in standalone (file-storage) mode for platform
          # secret material. Runs in dev-like mode BUT with real file
          # backend so secrets persist across restarts. Operators run:
          #   kubectl exec -n vault-system vault-0 -- vault operator init
          #   kubectl exec -n vault-system vault-0 -- vault operator unseal
          # to unseal on first boot. Root token + unseal keys stored in
          # `vault-init` secret by post-install script (later).
          #
          # For Phase 3 we enable the internal dev listener (no TLS between
          # Vault and ESO since both run in-cluster and traffic stays on
          # the CNI overlay). Prod cutover adds TLS via cert-manager.
          - name: vault
            namespace: vault-system
            syncWave: "4"
            repoURL: https://helm.releases.hashicorp.com
            chart: vault
            targetRevision: "0.29.1"
            values: |
              global:
                enabled: true
                tlsDisable: true
              injector:
                enabled: false
              server:
                image:
                  repository: hashicorp/vault
                  tag: 1.18.2
                dev:
                  enabled: false
                standalone:
                  enabled: true
                  config: |
                    ui = true
                    listener "tcp" {
                      tls_disable = 1
                      address = "[::]:8200"
                      cluster_address = "[::]:8201"
                    }
                    storage "file" {
                      path = "/vault/data"
                    }
                dataStorage:
                  enabled: true
                  size: 10Gi
                  storageClass: longhorn
                  accessMode: ReadWriteOnce
                auditStorage:
                  enabled: true
                  size: 10Gi
                  storageClass: longhorn
                  accessMode: ReadWriteOnce
                resources:
                  requests:
                    cpu: 100m
                    memory: 256Mi
                  limits:
                    memory: 512Mi
                readinessProbe:
                  enabled: true
                  path: "/v1/sys/health?standbyok=true&sealedcode=204&uninitcode=204"
                livenessProbe:
                  enabled: true
                  path: "/v1/sys/health?standbyok=true"
                  initialDelaySeconds: 60
                serviceAccount:
                  create: true
                  name: vault
              ui:
                enabled: true
                serviceType: ClusterIP
                externalPort: 8200

          # ----- Wave 4: External Secrets Operator -----------------------
          # ESO controller that reconciles ExternalSecret CRDs into native
          # K8s Secrets by reading from ClusterSecretStore (Vault).
          - name: external-secrets
            namespace: external-secrets
            syncWave: "4"
            repoURL: https://charts.external-secrets.io
            chart: external-secrets
            targetRevision: "0.10.7"
            values: |
              installCRDs: true
              replicaCount: 1
              leaderElect: true
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  memory: 256Mi
              webhook:
                replicaCount: 1
                resources:
                  requests:
                    cpu: 50m
                    memory: 128Mi
                  limits:
                    memory: 256Mi
              certController:
                replicaCount: 1
                resources:
                  requests:
                    cpu: 50m
                    memory: 128Mi
                  limits:
                    memory: 256Mi

          # ----- Wave 5: Platform registry (Harbor) --------------------
          # Harbor chart (goharbor) with bundled PostgreSQL + Redis. Trivy
          # + Chartmuseum disabled to keep the footprint small. Registry
          # blob storage uses Longhorn filesystem PVCs (MinIO S3 backend
          # migration deferred to later sprint — requires secret wiring
          # via ExternalSecret from Vault).
          #
          # External URL: https://harbor.iyziops.com (Cilium Gateway).
          # Admin password: chart-generated random, stored in
          # `harbor-core` secret (`HARBOR_ADMIN_PASSWORD` env var) — or
          # retrievable via:
          #   kubectl get secret -n harbor-system harbor-core \
          #     -o jsonpath='{.data.HARBOR_ADMIN_PASSWORD}' | base64 -d
          - name: harbor
            namespace: harbor-system
            syncWave: "5"
            repoURL: https://helm.goharbor.io
            chart: harbor
            targetRevision: "1.16.2"
            values: |
              expose:
                type: clusterIP
                tls:
                  enabled: false
                clusterIP:
                  name: harbor
                  ports:
                    httpPort: 80
                    httpsPort: 443
              externalURL: https://harbor.iyziops.com
              # Admin password generated by chart and written to core secret.
              # existingSecretAdminPassword: "" keeps chart auto-gen.
              harborAdminPassword: "Harbor12345"
              # Internal component TLS disabled — traffic stays inside the
              # CNI overlay. Gateway API terminates external TLS upstream.
              internalTLS:
                enabled: false
              persistence:
                enabled: true
                resourcePolicy: "keep"
                persistentVolumeClaim:
                  registry:
                    storageClass: longhorn
                    accessMode: ReadWriteOnce
                    size: 50Gi
                  jobservice:
                    jobLog:
                      storageClass: longhorn
                      accessMode: ReadWriteOnce
                      size: 5Gi
                  database:
                    storageClass: longhorn
                    accessMode: ReadWriteOnce
                    size: 5Gi
                  redis:
                    storageClass: longhorn
                    accessMode: ReadWriteOnce
                    size: 2Gi
                  trivy:
                    storageClass: longhorn
                    accessMode: ReadWriteOnce
                    size: 5Gi
                imageChartStorage:
                  disableredirect: false
                  type: filesystem
                  filesystem:
                    rootdirectory: /storage
              core:
                replicas: 1
                resources:
                  requests:
                    cpu: 100m
                    memory: 256Mi
                  limits:
                    memory: 1Gi
              portal:
                replicas: 1
                resources:
                  requests:
                    cpu: 50m
                    memory: 128Mi
                  limits:
                    memory: 256Mi
              registry:
                replicas: 1
                registry:
                  resources:
                    requests:
                      cpu: 100m
                      memory: 256Mi
                    limits:
                      memory: 512Mi
                controller:
                  resources:
                    requests:
                      cpu: 50m
                      memory: 128Mi
                    limits:
                      memory: 256Mi
              jobservice:
                replicas: 1
                resources:
                  requests:
                    cpu: 50m
                    memory: 128Mi
                  limits:
                    memory: 512Mi
              database:
                type: internal
                internal:
                  resources:
                    requests:
                      cpu: 100m
                      memory: 256Mi
                    limits:
                      memory: 1Gi
              redis:
                type: internal
                internal:
                  resources:
                    requests:
                      cpu: 50m
                      memory: 128Mi
                    limits:
                      memory: 256Mi
              trivy:
                enabled: false
              exporter:
                enabled: false
              metrics:
                enabled: false

          # ----- Wave 6: Data services (FUTURE — Sprint D1) -------------
          # - name: everest
          #   namespace: everest-system
          #   syncWave: "5"
          #   repoURL: https://percona.github.io/percona-helm-charts
          #   chart: everest
          #   targetRevision: <latest>
          #   values: |
          #     (see Sprint D1 values)

  template:
    metadata:
      name: "{{.name}}"
      namespace: argocd
      labels:
        argocd.argoproj.io/sync-wave: "{{.syncWave}}"
        iyziops.io/layer: platform-helm
      annotations:
        argocd.argoproj.io/sync-wave: "{{.syncWave}}"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: iyziops-platform
      source:
        repoURL: "{{.repoURL}}"
        chart: "{{.chart}}"
        targetRevision: "{{.targetRevision}}"
        helm:
          releaseName: "{{.name}}"
          values: |
            {{- .values | nindent 12 }}
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{.namespace}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
        retry:
          limit: 10
          backoff:
            duration: 10s
            factor: 2
            maxDuration: 2m
      # Kyverno + cert-manager ship CRDs whose server-side fields drift with
      # every reconcile. Ignoring drift on .spec/.metadata of CRDs keeps the
      # Application Synced without losing the ability to upgrade via chart
      # version bump.
      ignoreDifferences:
        - group: apiextensions.k8s.io
          kind: CustomResourceDefinition
          jqPathExpressions:
            - .spec
            - .metadata.annotations
            - .metadata.labels
        # K8s 1.32+ default-fills these StatefulSet fields at admission
        # time (persistentVolumeClaimRetentionPolicy, ordinals, minReady-
        # Seconds) which our chart manifests don't include, producing
        # persistent OutOfSync drift on every generated StatefulSet app
        # (vault, alertmanager, prometheus, loki singleBinary).
        - group: apps
          kind: StatefulSet
          jqPathExpressions:
            - .spec.persistentVolumeClaimRetentionPolicy
            - .spec.ordinals
            - .spec.minReadySeconds
            - .spec.revisionHistoryLimit
            # volumeMode, apiVersion, kind, creationTimestamp, status are
            # all default-filled on volumeClaimTemplates at admission time
            # on K8s 1.32 → cannot be matched by the rendered chart.
            - .spec.volumeClaimTemplates[].spec.volumeMode
            - .spec.volumeClaimTemplates[].apiVersion
            - .spec.volumeClaimTemplates[].kind
            - .spec.volumeClaimTemplates[].metadata.creationTimestamp
            - .spec.volumeClaimTemplates[].status
