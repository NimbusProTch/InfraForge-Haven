apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: haven-platform
  namespace: argocd
  labels:
    haven.io/managed: "true"
  # Finalizer ensures child applications are deleted when this is deleted
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    # Platform applications only (haven-api, haven-ui)
    # Tenant ApplicationSets are created per-tenant by the Haven API
    repoURL: https://github.com/NimbusProTch/InfraForge-Haven.git
    targetRevision: main
    path: platform/argocd/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
