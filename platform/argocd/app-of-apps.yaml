apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: haven-platform
  namespace: argocd
  labels:
    haven.io/managed: "true"
  # Finalizer ensures child applications are deleted when this is deleted
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    # PLACEHOLDER: Replace with your actual git repo URL after connecting to ArgoCD
    repoURL: https://github.com/YOUR_ORG/InfraForge-Haven
    targetRevision: main
    path: platform/argocd/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
