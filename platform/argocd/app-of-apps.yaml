apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: haven-platform
  namespace: argocd
  labels:
    haven.io/managed: "true"
  # Finalizer ensures child applications are deleted when this is deleted
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    # Platform applications (haven-api, haven-ui)
    - repoURL: https://github.com/NimbusProTch/InfraForge-Haven.git
      targetRevision: feature/platform-v2
      path: platform/argocd/apps
    # Tenant ApplicationSets (auto-discover from gitops repo)
    - repoURL: https://github.com/NimbusProTch/InfraForge-Haven.git
      targetRevision: feature/platform-v2
      path: platform/argocd/applicationsets
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
