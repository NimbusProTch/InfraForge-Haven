apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: haven-tenant-apps
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: http://gitea-http.gitea-system.svc.cluster.local:3000/haven/haven-gitops.git
        revision: main
        directories:
          - path: "tenants/*/*"
          # Exclude services subdirectories
          - path: "tenants/*/services"
            exclude: true
          - path: "tenants/*/services/*"
            exclude: true
  template:
    metadata:
      # segments: [0]=tenants [1]=tenant-slug [2]=app-slug
      name: "{{ index .path.segments 1 }}-{{ index .path.segments 2 }}"
      namespace: argocd
      labels:
        haven.io/managed: "true"
        haven.io/tenant: "{{ index .path.segments 1 }}"
        haven.io/app: "{{ index .path.segments 2 }}"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      sources:
        # Helm chart from GitHub repo
        - repoURL: https://github.com/NimbusProTch/InfraForge-Haven.git
          targetRevision: main
          path: "charts/haven-app"
          helm:
            valueFiles:
              - "$values/{{ .path.path }}/values.yaml"
        # Values from Gitea gitops repo
        - repoURL: http://gitea-http.gitea-system.svc.cluster.local:3000/haven/haven-gitops.git
          targetRevision: main
          ref: values
      destination:
        server: https://kubernetes.default.svc
        namespace: "tenant-{{ index .path.segments 1 }}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=false
          - ServerSideApply=true
        retry:
          limit: 3
          backoff:
            duration: 5s
            factor: 2
            maxDuration: 3m
