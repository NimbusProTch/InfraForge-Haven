apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: haven-tenant-services
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: https://github.com/NimbusProTch/InfraForge-Haven.git
        revision: feature/platform-v2
        directories:
          - path: "gitops/tenants/*/services/*"
  template:
    metadata:
      # segments: [0]=gitops [1]=tenants [2]=tenant [3]=services [4]=service-name
      name: "svc-{{ index .path.segments 2 }}-{{ index .path.segments 4 }}"
      namespace: argocd
      labels:
        haven.io/managed: "true"
        haven.io/tenant: "{{ index .path.segments 2 }}"
        haven.io/service: "{{ index .path.segments 4 }}"
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      source:
        repoURL: https://github.com/NimbusProTch/InfraForge-Haven.git
        targetRevision: feature/platform-v2
        path: "charts/haven-managed-service"
        helm:
          valueFiles:
            - "/{{ .path.path }}/values.yaml"
      destination:
        server: https://kubernetes.default.svc
        namespace: "tenant-{{ index .path.segments 2 }}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=false
          - ServerSideApply=true
