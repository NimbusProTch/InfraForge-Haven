apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno
  namespace: argocd
  labels:
    haven.io/component: policy-engine
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: iyziops-platform
  # Kyverno's chart bundles its CRDs as standard templates (not Helm hooks).
  # ArgoCD compares those CRDs against the live cluster on every reconcile
  # cycle and the diff is non-trivial because Kyverno extends the CRDs at
  # runtime (admission controller writes status fields, server-side defaults
  # add validation, etc.). Telling ArgoCD to ignore drift on the entire
  # spec/metadata of each CRD keeps it Synced without losing the ability
  # to upgrade them via a chart version bump.
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jqPathExpressions:
        - .spec
        - .metadata.annotations
        - .metadata.labels
  source:
    repoURL: https://kyverno.github.io/kyverno
    chart: kyverno
    targetRevision: 3.7.1
    helm:
      releaseName: kyverno
      values: |
        # HA: 3 replicas for webhook availability (342 municipalities SLA)
        admissionController:
          replicas: 3
          podDisruptionBudget:
            minAvailable: 2
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              memory: 2Gi

        backgroundController:
          replicas: 2
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi

        cleanupController:
          replicas: 1

        reportsController:
          replicas: 1

        # Namespace exclusions — system namespaces skip policy enforcement
        config:
          excludeKyvernoNamespace: true
          webhooks:
            failurePolicy: Fail
            namespaceSelector:
              matchExpressions:
                - key: kubernetes.io/metadata.name
                  operator: NotIn
                  values:
                    - kyverno-system
                    - kube-system
                    - kube-public
                    - kube-node-lease
                    - default
                    - argocd
                    - haven-system
                    - haven-builds
                    - haven-gateway
                    - longhorn-system
                    - cert-manager
                    - monitoring
                    - logging
                    - harbor-system
                    - minio-system
                    - gitea-system
                    - keycloak
                    - cnpg-system
                    - everest
                    - everest-system
                    - everest-olm
                    - everest-monitoring
                    - redis-system
                    - rabbitmq-system

        # Enable PolicyReport CRD for compliance audit trail
        features:
          policyExceptions:
            enabled: true
            namespace: kyverno-system
  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # ServerSideApply alone is enough — Kyverno ships
      # clusterpolicies.kyverno.io / policies.kyverno.io CRDs whose schema
      # exceeds the 256k client-side last-applied-configuration cap. Mixing
      # in Replace=true breaks SSA on these (kubectl falls back to client
      # patching). Pure SSA bypasses the annotation cap entirely.
      - ServerSideApply=true
