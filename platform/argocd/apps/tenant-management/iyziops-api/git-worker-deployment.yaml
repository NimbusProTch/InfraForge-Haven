apiVersion: apps/v1
kind: Deployment
metadata:
  name: iyziops-git-worker
  namespace: haven-system
  labels:
    app: iyziops-git-worker
    haven.io/component: git-worker
spec:
  # Scaled to 0 on iyziops until the haven-api image is rebuilt against an
  # iyziops-accessible registry. See haven-api/deployment.yaml for context.
  replicas: 0
  selector:
    matchLabels:
      app: iyziops-git-worker
  template:
    metadata:
      labels:
        app: iyziops-git-worker
        haven.io/component: git-worker
    spec:
      serviceAccountName: iyziops-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: git-worker
          image: harbor.iyziops.com/library/iyziops-api@sha256:093d7c884695be90370a14f410891b1f64f3855ea9cb50afc4e7bc307abfe590
          command: ["python", "-m", "app.workers.git_worker"]
          envFrom:
            - configMapRef:
                name: iyziops-api-config
            - secretRef:
                name: iyziops-api-secrets
                optional: true
          env:
            - name: K8S_INCLUSTER
              value: "true"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
      tolerations:
        - operator: Exists
