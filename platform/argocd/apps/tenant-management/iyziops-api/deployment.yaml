apiVersion: apps/v1
kind: Deployment
metadata:
  name: iyziops-api
  namespace: haven-system
  labels:
    app: iyziops-api
    haven.io/component: api
spec:
  # OVERNIGHT SPRINT 2026-04-17: images rebuilt from source and pushed to
  # temp in-cluster registry (temp-registry/registry.temp-registry.svc,
  # ClusterIP 10.43.188.196:5000). Nodes containerd pre-pulled via ctr so
  # imagePullPolicy: IfNotPresent works. Deploy pinned to worker-0 where image
  # cache + dev postgres (iyziops-db) + containerd are co-located to avoid
  # cross-node volume/DNS flakiness seen during recovery. Replace with
  # Harbor-backed digest + remove nodeSelector once Harbor is Healthy and
  # a proper build-push pipeline lands (blocked on: Longhorn CSI attach
  # stability, harbor-database PVC mount).
  replicas: 1
  selector:
    matchLabels:
      app: iyziops-api
  template:
    metadata:
      labels:
        app: iyziops-api
        haven.io/component: api
      annotations:
        # Force pod restart when ConfigMap changes (ArgoCD will update this annotation)
        kubectl.kubernetes.io/restartedAt: "2026-04-13T09:00:00Z"
    spec:
      serviceAccountName: iyziops-api
      # Pod-level security context — applies to every container by default.
      # PSA restricted requires runAsNonRoot + seccompProfile at this level.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      tolerations:
        - operator: "Exists"
      # Pin to worker-0 (overnight sprint): image is pre-pulled in worker-0's
      # containerd via ctr, and the dev-mode iyziops-db Deployment runs on
      # worker-0 with emptyDir storage. Removing this pin requires either
      # pre-pulling to all workers or fixing worker-1/worker-2 socketLB so
      # they can reach the temp-registry ClusterIP.
      nodeSelector:
        kubernetes.io/hostname: iyziops-worker-0
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: iyziops-api
                topologyKey: kubernetes.io/hostname
      initContainers:
        - name: db-migrate
          image: harbor.iyziops.com/library/iyziops-api@sha256:eb33671a38cad4b05b304ca26e50bb43a0584b5b1bba6de4081d9c37ff1949df
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              # Run pending migrations (idempotent — skips already-applied ones)
              # NEVER use 'stamp head' here — it marks DB as migrated without running migrations
              python -m alembic -c alembic/alembic.ini upgrade head
          envFrom:
            - configMapRef:
                name: iyziops-api-config
            - secretRef:
                name: iyziops-api-secrets
                optional: true
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          # PSA restricted requires every container (including initContainers)
          # to set these explicitly. Inheriting from pod-level securityContext
          # is not enough for the admission check.
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
      containers:
        - name: iyziops-api
          image: harbor.iyziops.com/library/iyziops-api@sha256:eb33671a38cad4b05b304ca26e50bb43a0584b5b1bba6de4081d9c37ff1949df
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: K8S_INCLUSTER
              value: "true"
          envFrom:
            - configMapRef:
                name: iyziops-api-config
            - secretRef:
                name: iyziops-api-secrets
                optional: true
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
