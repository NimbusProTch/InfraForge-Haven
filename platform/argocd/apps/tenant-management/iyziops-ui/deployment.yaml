apiVersion: apps/v1
kind: Deployment
metadata:
  name: iyziops-ui
  namespace: haven-system
  labels:
    app: iyziops-ui
    haven.io/component: ui
spec:
  # OVERNIGHT SPRINT 2026-04-17: images rebuilt, pushed to temp in-cluster
  # registry. Pinned to worker-0. See iyziops-api/deployment.yaml rationale.
  replicas: 1
  selector:
    matchLabels:
      app: iyziops-ui
  template:
    metadata:
      labels:
        app: iyziops-ui
        haven.io/component: ui
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      tolerations:
        - operator: "Exists"
      nodeSelector:
        kubernetes.io/hostname: iyziops-worker-0
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: iyziops-ui
                topologyKey: kubernetes.io/hostname
      containers:
        - name: iyziops-ui
          image: harbor.iyziops.com/library/iyziops-ui@sha256:7b290756cea5be04c5e9a5b1be127765edbde8a86be6a37e00f5a933578f1378
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: iyziops-ui-config
            - secretRef:
                name: iyziops-ui-secrets
                optional: true
          readinessProbe:
            httpGet:
              path: /api/auth/csrf
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/auth/csrf
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
