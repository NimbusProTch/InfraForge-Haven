apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: haven-api
  namespace: argocd
  labels:
    haven.io/component: api
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    # PLACEHOLDER: Replace with your actual git repo URL after connecting to ArgoCD
    repoURL: https://github.com/YOUR_ORG/InfraForge-Haven
    targetRevision: main
    path: platform/manifests/haven-api
  destination:
    server: https://kubernetes.default.svc
    namespace: haven-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
