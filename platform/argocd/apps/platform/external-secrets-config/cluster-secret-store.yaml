---
# =============================================================================
#  ClusterSecretStore/vault-backend — 2.V.2
# =============================================================================
#  Tells the External Secrets Operator (ESO) where and how to fetch secrets:
#    - Vault KV v2 at path `kv/` (logical prefix: platform/*)
#    - Kubernetes auth method with role `external-secrets`
#    - Authenticating as the `external-secrets` SA in the `external-secrets` ns
#
#  Vault prerequisites (set manually in 2.V.2 bootstrap — cluster-writable
#  Vault state; out of scope for GitOps until Vault IaC lands):
#    - `vault secrets enable -path=kv kv-v2`
#    - `vault policy write platform-eso-read` (read kv/data/platform/*,
#      list kv/metadata/platform/*)
#    - `vault auth enable kubernetes`
#    - `vault write auth/kubernetes/config` (kubernetes_host, ca, reviewer JWT)
#    - `vault write auth/kubernetes/role/external-secrets`
#        bound_service_account_names=external-secrets
#        bound_service_account_namespaces=external-secrets
#        token_policies=platform-eso-read
#        audience=vault
#
#  This manifest lives in its own Application path so it is NOT part of the
#  ESO Helm chart source — the Helm chart must not touch ClusterSecretStore
#  (that was the lesson from PR #117 -> #118). ESO chart owns the operator;
#  this Application owns the consumer-side configuration.
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault-backend
  labels:
    iyziops.io/layer: platform-raw
    iyziops.io/source: external-secrets-config
spec:
  provider:
    vault:
      server: "http://vault.vault-system.svc.cluster.local:8200"
      path: "kv"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "external-secrets"
          serviceAccountRef:
            name: "external-secrets"
            namespace: "external-secrets"
            # ESO projects a token with these audiences; Vault role is bound
            # to audience=vault so the two must match.
            audiences:
              - vault
