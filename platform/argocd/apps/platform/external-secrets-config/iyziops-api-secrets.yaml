---
# =============================================================================
#  iyziops-api — partial Vault cutover (2.V.3)
# =============================================================================
#  First real ExternalSecret on the vault-backend ClusterSecretStore. Moves
#  FOUR of the nine fields in the existing haven-system/iyziops-api-secrets
#  Secret onto Vault; the other five (EVEREST_ADMIN_PASSWORD, GITEA_ADMIN_
#  TOKEN, GITHUB_CLIENT_ID, HARBOR_ADMIN_PASSWORD, KEYCLOAK_ADMIN_PASSWORD)
#  stay as plaintext K8s Secret entries until their upstream services do
#  their own Vault migrations (2.V.4 / 2.V.5 / 2.V.6 / 2.V.7).
#
#  Critical: `creationPolicy: Merge`. This is the ONLY policy that lets us
#  phase the migration without disturbing the other five plaintext entries.
#  Owner would replace the entire Secret body with only these four fields,
#  breaking iyziops-api on the next pod restart.
#
#  `deletionPolicy: Retain` means if this ExternalSecret is ever deleted, the
#  managed fields stay in the K8s Secret instead of being stripped out —
#  rollback safety (the pod keeps running on whatever values last synced).
#
#  Rotation policy (per docs/audits/bolge-2v-secrets-2026-04-21.md §1):
#    - DATABASE_URL:        copied from live Secret pre-migration; 90d rotate
#                           (driven by CNPG operator in a later PR)
#    - GITHUB_CLIENT_SECRET: copied from live Secret; 90d manual regen via
#                           GitHub OAuth App settings
#    - SECRET_KEY:          ROTATED pre-migration (was dev placeholder); 180d
#    - WEBHOOK_SECRET:      ROTATED pre-migration (was `placeholder` literal);
#                           on rotation, external Gitea/GitHub webhooks must
#                           be re-configured with the new value
# =============================================================================
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: iyziops-api-secrets-vault
  namespace: haven-system
  labels:
    iyziops.io/layer: platform-raw
    iyziops.io/source: external-secrets-config
    iyziops.io/phase: "2.V.3"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: iyziops-api-secrets
    # Merge — leaves the five unmanaged fields alone. Switch to Owner only
    # after 2.V.4 / 2.V.5 / 2.V.6 / 2.V.7 have all landed and the full set
    # of nine fields lives in Vault.
    creationPolicy: Merge
    # Retain — on ExternalSecret delete, keep the K8s Secret intact so the
    # pod does not crash-loop on missing env vars during rollback.
    deletionPolicy: Retain
    # Template overrides: when ESO materializes the Secret, the parent
    # ExternalSecret CR carries ArgoCD tracking (label argocd.argoproj.io/
    # instance=external-secrets-config because this manifest IS in that app's
    # source path). ESO propagates all labels/annotations from the parent
    # onto the child Secret, which makes ArgoCD see the Secret as an
    # "extraneous" managed resource (tracking label present, but no Secret
    # manifest in the source) and prune it on every sync → the Secret
    # vanishes within 2s of creation, ESO re-errors "UpdateFailed" with
    # Merge+missing-target, pod crash-loops on empty DATABASE_URL.
    # `IgnoreExtraneous` tells ArgoCD to leave this particular Secret alone
    # (it's produced out-of-band by ESO, not declared directly in git).
    template:
      metadata:
        annotations:
          argocd.argoproj.io/compare-options: IgnoreExtraneous
          argocd.argoproj.io/sync-options: Prune=false
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: platform/iyziops-api/database
        property: url
    - secretKey: GITHUB_CLIENT_SECRET
      remoteRef:
        key: platform/iyziops-api/github-repo-oauth
        property: client_secret
    - secretKey: SECRET_KEY
      remoteRef:
        key: platform/iyziops-api/session-secret
        property: value
    - secretKey: WEBHOOK_SECRET
      remoteRef:
        key: platform/iyziops-api/webhook-secret
        property: value
