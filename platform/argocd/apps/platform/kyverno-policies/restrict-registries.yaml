apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: restrict-image-registries
  annotations:
    policies.kyverno.io/title: Restrict Image Registries
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      Tenant workloads may only pull images from the iyziops Harbor registry.
      This prevents supply chain attacks via untrusted public registries.
spec:
  validationFailureAction: Audit  # TODO: switch to Enforce after 24-48h observation
  background: true
  rules:
    - name: validate-container-registries
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaceSelector:
                matchLabels:
                  haven.io/managed: "true"
      validate:
        message: >-
          Image '{{request.object.spec.containers[*].image}}' is not from an
          approved registry. Only images from the iyziops Harbor registry
          (harbor.iyziops.com or the legacy harbor.46.225.42.2.sslip.io) are
          allowed in tenant namespaces.
        # Support both the new hostname (harbor.iyziops.com, current pipeline
        # target) and the legacy sslip.io hostname (kept during the rename
        # transition — can be removed after a full rebuild of every tenant).
        anyPattern:
          - spec:
              containers:
                - image: "harbor.iyziops.com/*"
          - spec:
              containers:
                - image: "harbor.46.225.42.2.sslip.io/*"
    - name: validate-init-container-registries
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaceSelector:
                matchLabels:
                  haven.io/managed: "true"
      validate:
        message: >-
          Init container image is not from an approved registry (harbor.iyziops.com
          or legacy harbor.46.225.42.2.sslip.io; alpine/busybox allowed).
        pattern:
          spec:
            =(initContainers):
              - image: "harbor.iyziops.com/* | harbor.46.225.42.2.sslip.io/* | alpine:* | busybox:*"
