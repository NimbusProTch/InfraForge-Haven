---
apiVersion: v1
kind: ConfigMap
metadata:
  name: minio-tls-proxy-config
  namespace: minio-system
data:
  nginx.conf: |
    worker_processes 1;
    events { worker_connections 1024; }
    http {
      proxy_http_version 1.1;
      proxy_request_buffering off;
      proxy_buffering off;
      client_max_body_size 0;
      client_body_buffer_size 1m;
      server {
        listen 9443 ssl http2;
        server_name minio-tls.minio-system.svc;
        ssl_certificate /etc/tls/tls.crt;
        ssl_certificate_key /etc/tls/tls.key;
        location / {
          proxy_pass http://minio:9000;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_read_timeout 3600s;
          proxy_send_timeout 3600s;
        }
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio-tls-proxy
  namespace: minio-system
  labels:
    app: minio-tls-proxy
spec:
  replicas: 1
  selector:
    matchLabels: {app: minio-tls-proxy}
  template:
    metadata:
      labels: {app: minio-tls-proxy}
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 9443
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: tls
              mountPath: /etc/tls
              readOnly: true
          resources:
            requests: {cpu: 10m, memory: 16Mi}
            limits: {memory: 64Mi}
          readinessProbe:
            tcpSocket: {port: 9443}
            initialDelaySeconds: 2
            periodSeconds: 5
      volumes:
        - name: config
          configMap: {name: minio-tls-proxy-config}
        - name: tls
          secret: {secretName: minio-tls-proxy-cert}
---
apiVersion: v1
kind: Service
metadata:
  name: minio-tls
  namespace: minio-system
spec:
  selector: {app: minio-tls-proxy}
  ports:
    - name: https
      port: 9443
      targetPort: 9443
  type: ClusterIP
