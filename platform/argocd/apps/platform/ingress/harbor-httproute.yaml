---
# =============================================================================
#  harbor.iyziops.com — HTTPRoute
# =============================================================================
#  Routes the https listener on iyziops-gateway to the `harbor` ClusterIP
#  Service in the harbor-system namespace (expose.type: clusterIP +
#  expose.clusterIP.name: harbor in the chart values). The Service
#  multiplexes portal UI, core API, and registry blob endpoints on
#  httpPort 80 behind nginx-proxy, so a single HTTPRoute suffices.
#
#  ReferenceGrant lets the HTTPRoute (iyziops-gateway ns) point at the
#  harbor Service (harbor-system ns).
# =============================================================================
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: iyziops-gateway-to-harbor
  namespace: harbor-system
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: iyziops-gateway
  to:
    - group: ""
      kind: Service
      name: harbor
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: harbor
  namespace: iyziops-gateway
  annotations:
    argocd.argoproj.io/sync-wave: "6"
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: iyziops-gateway
      sectionName: https
  hostnames:
    - harbor.iyziops.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: harbor
          namespace: harbor-system
          port: 80
          weight: 1
