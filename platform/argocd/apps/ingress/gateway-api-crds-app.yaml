---
# =============================================================================
#  Gateway API CRDs — pulled from upstream kubernetes-sigs/gateway-api
# =============================================================================
#  We use the experimental channel because Cilium's Gateway API integration
#  requires TLSRoute (which only ships in the experimental bundle as of
#  v1.2.0). The standard channel covers HTTPRoute / Gateway / GatewayClass
#  but omits TLSRoute / GRPCRoute / TCPRoute / UDPRoute.
#
#  Pinning to a specific tag (v1.2.0) makes the CRD set immutable for the
#  cluster lifetime — upgrades happen through a deliberate bump of
#  targetRevision below, not through silent track-the-tip drift.
#
#  syncOptions:
#    Replace=true       — CRDs use last-applied-configuration; replace gives
#                         deterministic apply on schema changes
#    ServerSideApply=true — required for very-large CRD manifests (Gateway
#                         API CRDs exceed the 256k client-side annotation cap)
#
#  prune: false — never delete a CRD via GitOps — orphaned CRs survive
#                 (would silently delete every Gateway/HTTPRoute resource).
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gateway-api-crds
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: iyziops-platform
  source:
    repoURL: https://github.com/kubernetes-sigs/gateway-api
    targetRevision: v1.2.0
    path: config/crd/experimental
  destination:
    server: https://kubernetes.default.svc
    namespace: ""
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - Replace=true
      - ServerSideApply=true
