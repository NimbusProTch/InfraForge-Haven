name: UI CI

on:
  workflow_dispatch:
  push:
    branches: [main, "feature/**"]
    paths:
      - "ui/**"
      - ".github/workflows/ui-ci.yml"
  pull_request:
    paths:
      - "ui/**"

permissions:
  contents: write

env:
  REGISTRY: ${{ secrets.HARBOR_URL }}
  IMAGE_NAME: ${{ secrets.HARBOR_PROJECT }}/haven-ui

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: [self-hosted, haven]
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build
        env:
          # Use placeholder URLs for CI build validation
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ci-placeholder-secret
          NEXT_PUBLIC_API_URL: http://localhost:8000
          KEYCLOAK_URL: http://localhost:8080
          KEYCLOAK_REALM: haven
          KEYCLOAK_CLIENT_ID: haven-ui
          KEYCLOAK_CLIENT_SECRET: placeholder

  build-and-push:
    name: Build & Push Docker Image
    runs-on: [self-hosted, haven]
    needs: lint-and-build
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      short_sha: ${{ steps.sha.outputs.short }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract git SHA (short)
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USER }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and push
        id: build
        run: |
          TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.sha.outputs.short }}"
          LATEST="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          docker build --platform linux/amd64 \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }} \
            -t "$TAG" -t "$LATEST" -f ui/Dockerfile ui
          docker push "$TAG"
          docker push "$LATEST"
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "$TAG" | cut -d@ -f2)
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

  update-manifest:
    name: Update Deployment Manifest
    runs-on: [self-hosted, haven]
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image digest in deployment manifest
        # H1a-3 (HAVEN_COMPLIANCE_PLAN.md): pin by sha256 digest, NOT tag.
        # See api-ci.yml for the rationale comment block.
        run: |
          DIGEST="${{ needs.build-and-push.outputs.digest }}"
          if [ -z "$DIGEST" ]; then
            echo "::error::Empty digest from build-and-push job — refusing to write a broken manifest"
            exit 1
          fi
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${DIGEST}"
          echo "Pinning manifest to: ${IMAGE}"
          sed -i -E "s|image: .*haven-ui[:@][^[:space:]]+|image: ${IMAGE}|g" \
            platform/manifests/haven-ui/deployment.yaml

      - name: Commit updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add platform/manifests/haven-ui/deployment.yaml
          git diff --cached --quiet || git commit -m "ci: pin haven-ui to ${{ needs.build-and-push.outputs.short_sha }} (digest) [skip ci]"
          git pull --rebase origin main
          git push
