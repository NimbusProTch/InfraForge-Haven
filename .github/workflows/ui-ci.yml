name: UI CI

on:
  workflow_dispatch:
  push:
    branches: [main, "feature/**"]
    paths:
      - "ui/**"
      - ".github/workflows/ui-ci.yml"
  pull_request:
    paths:
      - "ui/**"

permissions:
  contents: write

env:
  REGISTRY: ${{ secrets.HARBOR_URL }}
  IMAGE_NAME: ${{ secrets.HARBOR_PROJECT }}/iyziops-ui

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: [self-hosted, haven]
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build
        env:
          # Use placeholder URLs for CI build validation
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ci-placeholder-secret
          NEXT_PUBLIC_API_URL: http://localhost:8000
          KEYCLOAK_URL: http://localhost:8080
          KEYCLOAK_REALM: haven
          KEYCLOAK_CLIENT_ID: haven-ui
          KEYCLOAK_CLIENT_SECRET: placeholder

  build-and-push:
    name: Build & Push Docker Image
    runs-on: [self-hosted, haven]
    needs: lint-and-build
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      short_sha: ${{ steps.sha.outputs.short }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract git SHA (short)
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push with crane
        id: build
        run: |
          TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.sha.outputs.short }}"
          LATEST="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          # Build image — NEXT_PUBLIC_API_URL is baked at build time (Next.js
          # client bundle requirement), so it MUST match the production gateway
          # hostname. Previously read from a secret which still pointed at the
          # old `api.46.225.42.2.sslip.io` cluster, causing every UI page that
          # makes client-side API calls to ERR_ABORTED on connect. Hardcoded
          # to the canonical iyziops gateway here — non-sensitive value, no
          # reason to keep it in secrets.
          docker build --platform linux/amd64 \
            --build-arg NEXT_PUBLIC_API_URL=https://api.iyziops.com \
            -t "$TAG" -f ui/Dockerfile ui
          # Login + push via crane (HTTPS with Let's Encrypt TLS)
          crane auth login ${{ env.REGISTRY }} -u ${{ secrets.HARBOR_USER }} -p ${{ secrets.HARBOR_PASSWORD }}
          docker save "$TAG" -o /tmp/iyziops-ui.tar
          crane push /tmp/iyziops-ui.tar "$TAG"
          crane push /tmp/iyziops-ui.tar "$LATEST"
          rm -f /tmp/iyziops-ui.tar
          # Get digest for manifest pinning
          DIGEST=$(crane digest "$TAG")
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

  update-manifest:
    name: Update Deployment Manifest
    runs-on: [self-hosted, haven]
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image digest in deployment manifest
        # H1a-3 (HAVEN_COMPLIANCE_PLAN.md): pin by sha256 digest, NOT tag.
        # See api-ci.yml for the rationale comment block.
        run: |
          DIGEST="${{ needs.build-and-push.outputs.digest }}"
          if [ -z "$DIGEST" ]; then
            echo "::error::Empty digest from build-and-push job — refusing to write a broken manifest"
            exit 1
          fi
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${DIGEST}"
          echo "Pinning manifest to: ${IMAGE}"
          # NOTE: `|` inside the regex alternation conflicts with `|` as the sed
          # delimiter — use `#` as delimiter instead.
          sed -i -E "s#image: .*(haven|iyziops)-ui[:@][^[:space:]]+#image: ${IMAGE}#g" \
            platform/argocd/apps/tenant-management/iyziops-ui/deployment.yaml

      - name: Commit updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add platform/argocd/apps/tenant-management/iyziops-ui/deployment.yaml
          git diff --cached --quiet || git commit -m "ci: pin iyziops-ui to ${{ needs.build-and-push.outputs.short_sha }} (digest) [skip ci]"
          git pull --rebase origin main
          git push
