name: API CI

on:
  push:
    branches: [main, "feature/**"]
    paths:
      - "api/**"
      - ".github/workflows/api-ci.yml"
  pull_request:
    paths:
      - "api/**"

permissions:
  contents: write

env:
  REGISTRY: ${{ secrets.HARBOR_URL }}
  IMAGE_NAME: ${{ secrets.HARBOR_PROJECT }}/haven-api

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install ruff

      - name: Run ruff check
        run: ruff check .

      - name: Run ruff format check
        run: ruff format --check .

  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: haven
          POSTGRES_PASSWORD: haven
          POSTGRES_DB: haven_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://haven:haven@localhost:5432/haven_platform
          K8S_INCLUSTER: "false"
          DEBUG: "true"
        run: pytest tests/ -v --tb=short

  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: [lint, test]
    # Only push on main branch
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      short_sha: ${{ steps.sha.outputs.short }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract git SHA (short)
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.HARBOR_USER }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: api
          file: api/Dockerfile
          platforms: linux/amd64
          push: true
          # Tag is still pushed for human browsing in Harbor; the
          # deployment manifest references the immutable digest below.
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.sha.outputs.short }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  update-manifest:
    name: Update Deployment Manifest
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image digest in deployment manifests
        # H1a-3 (HAVEN_COMPLIANCE_PLAN.md): pin by sha256 digest, NOT tag.
        # Tags are mutable; an attacker (or a slip-up) can re-push the same tag
        # with different content. Digests are content-addressable and immutable,
        # which is exactly what Haven check #15 wants. The tag is still pushed
        # for human browsing in Harbor — the deployment just references the
        # digest URI form: `repo/image@sha256:abc123...`.
        run: |
          DIGEST="${{ needs.build-and-push.outputs.digest }}"
          if [ -z "$DIGEST" ]; then
            echo "::error::Empty digest from build-and-push job — refusing to write a broken manifest"
            exit 1
          fi
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${DIGEST}"
          echo "Pinning manifests to: ${IMAGE}"
          # Match BOTH the legacy tag form (`...:abc1234`) and the new digest
          # form (`...@sha256:...`) so re-runs after this PR work cleanly.
          sed -i -E "s|image: .*haven-api[:@][^[:space:]]+|image: ${IMAGE}|g" \
            platform/manifests/haven-api/deployment.yaml \
            platform/manifests/haven-api/git-worker-deployment.yaml

      - name: Commit updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add platform/manifests/haven-api/deployment.yaml platform/manifests/haven-api/git-worker-deployment.yaml
          git diff --cached --quiet || git commit -m "ci: pin haven-api to ${{ needs.build-and-push.outputs.short_sha }} (digest) [skip ci]"
          git pull --rebase origin main
          git push
