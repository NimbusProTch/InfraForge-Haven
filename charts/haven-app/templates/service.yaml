apiVersion: v1
kind: Service
metadata:
  name: {{ include "haven-app.fullname" . }}
  labels:
    {{- include "haven-app.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: {{ .Values.port }}
      protocol: TCP
      name: http
  selector:
    {{- include "haven-app.selectorLabels" . | nindent 4 }}
