{{- if and .Values.httproute.enabled .Values.image.repository }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "haven-app.fullname" . }}
  labels:
    {{- include "haven-app.labels" . | nindent 4 }}
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ .Values.httproute.gateway.name }}
      namespace: {{ .Values.httproute.gateway.namespace }}
  hostnames:
    - {{ include "haven-app.hostname" . | quote }}
    {{- if .Values.httproute.customDomain }}
    - {{ .Values.httproute.customDomain | quote }}
    {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: {{ include "haven-app.fullname" . }}
          port: 80
          weight: 1
{{- end }}
