# Service type: postgres | mysql | mongodb | redis | rabbitmq
serviceType: postgres
name: ""
namespace: ""
tier: dev  # dev | prod

# Percona Everest-managed databases
postgres:
  instances: 1     # prod → 3
  storage: 5Gi     # prod → 20Gi
  storageClass: longhorn
  version: "16"

mysql:
  instances: 1     # prod → 3
  storage: 5Gi     # prod → 20Gi
  storageClass: longhorn
  version: "8.0"

mongodb:
  instances: 1     # prod → 3
  storage: 5Gi     # prod → 20Gi
  storageClass: longhorn
  version: "7.0"

# OpsTree Redis Operator
redis:
  image: quay.io/opstree/redis:v7.0.15
  storage: 1Gi     # prod → 5Gi
  storageClass: longhorn

# RabbitMQ Cluster Operator
rabbitmq:
  replicas: 1      # prod → 3
  storage: 5Gi     # prod → 10Gi
  storageClass: longhorn
