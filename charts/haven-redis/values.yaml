# haven-redis default values (OpsTree Redis Operator)

name: ""
namespace: ""
plan: small  # small | medium | large

redis:
  image: quay.io/opstree/redis:v7.0.15
  storage: 1Gi
  storageClass: longhorn
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

# -- plan presets (reference only) --
# small:  1Gi storage,  50m/200m CPU,   64Mi/256Mi memory
# medium: 5Gi storage,  100m/500m CPU,  128Mi/512Mi memory
# large:  20Gi storage, 250m/1000m CPU, 256Mi/2Gi memory
