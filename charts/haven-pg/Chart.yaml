apiVersion: v2
name: haven-pg
description: >
  Haven-managed PostgreSQL cluster via CloudNativePG (CNPG).
  Wraps the CNPG Cluster CRD and ScheduledBackup with sane defaults
  for Haven tenants, including MinIO barman object-store backup support.
