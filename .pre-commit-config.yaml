# Sprint H4 (P3.3 / H4c) — pre-commit hook configuration.
#
# This file lives at the repo root. Install hooks once with:
#
#     pip install pre-commit
#     pre-commit install
#
# Then `git commit` will automatically run the listed hooks against any
# staged file. To run manually against the whole repo:
#
#     pre-commit run --all-files
#
# Hooks here are intentionally MINIMAL and FAST so they don't slow down
# the commit loop. Heavyweight scanners (semgrep, trivy) live in the CI
# workflow `code-quality.yml` instead.
#
# Goals:
#   1. Block accidental secret leaks BEFORE they hit git history
#   2. Block accidental whitespace/EOL/large-file mistakes
#   3. Auto-format Python so reviewers don't argue about style
#   4. Auto-fix lint issues that are mechanically fixable
#
# Goals NOT covered (intentional — too slow / too noisy):
#   - mypy (run in CI only)
#   - bandit (CI only)
#   - vulture (CI only)
#   - eslint (npm run lint in CI)

repos:
  # ----- Hygiene: whitespace, EOL, merge markers, large files -----
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict       # blocks `<<<<<<< HEAD` markers
      - id: check-yaml
        exclude: ^infrastructure/.*\.yaml\.tpl$  # template files have ${vars}
      - id: check-added-large-files
        args: [--maxkb=512]             # 512 KB max per file
      - id: check-case-conflict         # warns on case-insensitive filename clashes
      - id: detect-private-key          # catches PEM blocks accidentally staged

  # ----- Secret scanning (gitleaks) -----
  # Runs against the staged diff only (fast). The CI workflow runs
  # trufflehog against full git history with --only-verified for the
  # heavier verified-secret check.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        args: [--staged, --verbose, --redact]

  # ----- Python: ruff format + ruff lint --fix -----
  # Auto-fixes mechanical issues; matches the CI ruff version pinned in
  # api/pyproject.toml (>=0.8.0).
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^api/
      - id: ruff-format
        files: ^api/

  # ----- TypeScript: prettier (light auto-format) -----
  # Doesn't run eslint here (too slow). CI runs `npm run lint`.
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: ^ui/.*\.(ts|tsx|js|jsx|json|css|md)$
        exclude: ^ui/(node_modules|\.next|out|coverage)/

# Always run on explicit `pre-commit run --all-files`. Day-to-day, only
# the staged files get checked.
default_stages: [pre-commit]
fail_fast: false   # show all violations, not just the first
